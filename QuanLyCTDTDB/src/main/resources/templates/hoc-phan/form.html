<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="${isEdit} ? 'Chỉnh Sửa Học Phần' : 'Tạo Học Phần'">Học Phần</title>
</head>
<body>
<div layout:fragment="content">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/dashboard}">Trang Chủ</a></li>
            <li class="breadcrumb-item"><a th:href="@{/hoc-phan}">Học Phần</a></li>
            <li class="breadcrumb-item active"
                th:text="${isEdit} ? 'Chỉnh sửa' : 'Thêm mới'">Thêm mới</li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-start mb-4">
        <div>
            <p class="page-subtitle">Đào Tạo</p>
            <h4 class="page-title"
                th:text="${isEdit} ? 'Chỉnh Sửa Học Phần' : 'Tạo Học Phần Mới'">Tạo Học Phần Mới</h4>
        </div>
        <a th:href="@{/hoc-phan}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i>Quay Lại
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-9">
            <!-- Banner loi (non-field errors / exception tu service).
                 Dung th:if ${errorMsg} o ngoai form VI errorMsg la ModelAttribute
                 thuong, KHONG phai form-binding - duoc phep render o day. -->
            <div th:if="${errorMsg}"
                 class="alert alert-danger d-flex align-items-start" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2 mt-1"></i>
                <div>
                    <strong class="d-block">Khong the luu hoc phan</strong>
                    <span th:text="${errorMsg}"></span>
                </div>
            </div>

            <form th:action="${isEdit} ? @{/hoc-phan/sua/{ma}(ma=${hocPhanDTO.maHocPhan})} : @{/hoc-phan/them}"
                  th:object="${hocPhanDTO}"
                  method="post" enctype="multipart/form-data" novalidate>

                <!-- Banner loi validation: BAT BUOC nam BEN TRONG <form th:object>
                     vi #fields.hasErrors('*') can binding context cua th:object.
                     Dat o dau form de user nhin thay ngay. -->
                <div th:if="${#fields.hasErrors('*')}"
                     class="alert alert-warning d-flex align-items-start" role="alert">
                    <i class="bi bi-info-circle-fill me-2 mt-1"></i>
                    <div>
                        <strong class="d-block">Vui long kiem tra lai cac truong sau:</strong>
                        <ul class="mb-0">
                            <li th:each="err : ${#fields.allErrors()}" th:text="${err}"></li>
                        </ul>
                    </div>
                </div>

                <div class="card mb-3">
                    <div class="card-header">
                        <i class="bi bi-journal-text me-2"></i>Thông Tin Học Phần
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <div class="form-floating">
                                    <input type="text" class="form-control"
                                           id="maHocPhan" th:field="*{maHocPhan}"
                                           th:readonly="${isEdit}" placeholder="CS101">
                                    <label for="maHocPhan">Mã HP <span class="text-danger">*</span></label>
                                </div>
                            </div>
                            <div class="col-md-8">
                                <div class="form-floating">
                                    <input type="text" class="form-control"
                                           id="tenHocPhan" th:field="*{tenHocPhan}"
                                           placeholder="Nhập tên học phần...">
                                    <label for="tenHocPhan">Tên Học Phần <span class="text-danger">*</span></label>
                                    <div class="invalid-feedback d-block"
                                         th:if="${#fields.hasErrors('tenHocPhan')}"
                                         th:errors="*{tenHocPhan}"></div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="form-floating">
                                    <input type="number" class="form-control"
                                           id="soTinChi" th:field="*{soTinChi}" min="1" max="15">
                                    <label for="soTinChi">Số Tín Chỉ <span class="text-danger">*</span></label>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-floating">
                                    <select class="form-select" id="loaiHocPhan"
                                            th:field="*{loaiHocPhan}">
                                        <option value="">-- Chọn --</option>
                                        <option th:each="l : ${loaiHPList}"
                                                th:value="${l.name()}"
                                                th:text="${l.name() == 'LyThuyet' ? 'Lý Thuyết' :
                                                          (l.name() == 'ThucHanh' ? 'Thực Hành' :
                                                          (l.name() == 'DoAn'     ? 'Đồ Án'     :
                                                          (l.name() == 'ThucTap'  ? 'Thực Tập'  :
                                                          (l.name() == 'KienTap'  ? 'Kiến Tập'  : l.name()))))}"></option>
                                    </select>
                                    <label for="loaiHocPhan">Loại HP <span class="text-danger">*</span></label>
                                </div>
                            </div>
                            <div class="col-md-5">
                                <div class="form-floating">
                                    <select class="form-select" id="maChuNhiemHP"
                                            th:field="*{maChuNhiemHP}">
                                        <option value="">-- Chọn Chủ Nhiệm HP --</option>
                                        <option th:each="gv : ${giangVienList}"
                                                th:value="${gv.maGV}"
                                                th:text="${gv.maGV + ' - ' + gv.hoTen}"></option>
                                    </select>
                                    <label for="maChuNhiemHP">Chủ Nhiệm HP <span class="text-danger">*</span></label>
                                </div>
                            </div>

                            <div class="col-12">
                                <label for="fileDeCuong" class="form-label">
                                    <i class="bi bi-file-earmark-arrow-up me-1"></i>File Đề Cương (PDF/Word)
                                </label>
                                <input type="file" class="form-control" id="fileDeCuong"
                                       name="fileDeCuong" accept=".pdf,.doc,.docx">
                                <small class="text-muted">Để trống nếu không đổi file hiện tại.</small>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a th:href="@{/hoc-phan}" class="btn btn-outline-secondary">Huỷ</a>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save me-1"></i>
                        <span th:text="${isEdit} ? 'Cập Nhật' : 'Tạo Mới'">Tạo Mới</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

</div>
</body>
</html>
