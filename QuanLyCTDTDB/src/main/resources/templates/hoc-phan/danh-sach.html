<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/base}">
<head><title>Quản Lý Học Phần</title></head>
<body>
<div layout:fragment="content">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item">
                <a th:href="@{/dashboard}" class="text-decoration-none">
                    <i class="bi bi-house-door me-1"></i>Trang Chủ
                </a>
            </li>
            <li class="breadcrumb-item active" aria-current="page">Học Phần</li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-2">
        <div>
            <p class="page-subtitle">Đào Tạo</p>
            <h4 class="page-title mb-0">Quản Lý Học Phần</h4>
        </div>
        <a th:href="@{/hoc-phan/them}" class="btn btn-primary btn-sm"
           sec:authorize="hasAnyRole('CNHP','TTDTXS','ADMIN')">
            <i class="bi bi-plus-lg me-1"></i>Tạo Học Phần
        </a>
    </div>

    <!-- Flash messages da duoc render boi layout/base.html -->

    <!-- Filter toolbar (dedicated visual identity) -->
    <div class="filter-toolbar">
        <p class="filter-toolbar-title">
            <i class="bi bi-funnel"></i>Bộ Lọc Học Phần
        </p>
        <form th:action="@{/hoc-phan}" method="get" class="row g-2 align-items-end">
            <div class="col-md-8">
                <div class="input-group search-bar">
                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                    <input type="text" name="keyword" th:value="${keyword}"
                           class="form-control"
                           placeholder="Tìm theo mã, tên học phần hoặc chủ nhiệm HP..."
                           aria-label="Từ khoá tìm kiếm học phần">
                </div>
            </div>
            <div class="col-auto">
                <button class="btn btn-primary btn-sm">
                    <i class="bi bi-search me-1"></i>Tìm Kiếm
                </button>
                <a th:href="@{/hoc-phan}" class="btn btn-outline-secondary btn-sm ms-1"
                   data-bs-toggle="tooltip" data-bs-title="Xoá bộ lọc"
                   aria-label="Xoá bộ lọc">
                    <i class="bi bi-x-lg"></i>
                </a>
            </div>
        </form>
    </div>

    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span class="fw-semibold"><i class="bi bi-journal-text me-2"></i>Danh Sách Học Phần</span>
            <span class="badge bg-light text-dark" th:text="'Tổng: ' + ${#lists.size(danhSach)}">0</span>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-bordered align-middle mb-0">
                    <thead>
                        <tr>
                            <th style="width:50px;">STT</th>
                            <th>Mã HP</th>
                            <th>Tên Học Phần</th>
                            <th class="text-center">TC</th>
                            <th>Loại</th>
                            <th>Chủ Nhiệm HP</th>
                            <th>Đề Cương</th>
                            <th>Trạng Thái</th>
                            <th class="text-center" style="width:200px;">Thao Tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(danhSach)}">
                            <td colspan="9">
                                <div class="empty-state">
                                    <i class="bi bi-inbox"></i>
                                    <p>Chưa có học phần nào phù hợp bộ lọc.</p>
                                    <a th:href="@{/hoc-phan/them}" class="btn btn-primary btn-sm"
                                       sec:authorize="hasAnyRole('CNHP','TTDTXS','ADMIN')">
                                        <i class="bi bi-plus-lg me-1"></i>Tạo Học Phần
                                    </a>
                                </div>
                            </td>
                        </tr>
                        <tr th:each="hp, stat : ${danhSach}">
                            <td class="text-muted" th:text="${stat.index + 1}">1</td>
                            <td><code th:text="${hp.maHocPhan}"></code></td>
                            <td>
                                <a th:href="@{/hoc-phan/chi-tiet/{ma}(ma=${hp.maHocPhan})}"
                                   class="text-decoration-none fw-medium"
                                   th:text="${hp.tenHocPhan}"></a>
                            </td>
                            <td class="text-center">
                                <span class="badge bg-primary" th:text="${hp.soTinChi}">0</span>
                            </td>
                            <td class="small text-muted"
                                th:with="l=${hp.loaiHocPhan?.name()}"
                                th:text="${l == 'LyThuyet'  ? 'Lý Thuyết'  :
                                          (l == 'ThucHanh' ? 'Thực Hành' :
                                          (l == 'DoAn'     ? 'Đồ Án'     :
                                          (l == 'ThucTap'  ? 'Thực Tập'  :
                                          (l == 'KienTap'  ? 'Kiến Tập'  : '--'))))}">--</td>
                            <td class="small"
                                th:text="${hp.chuNhiemHP != null ? hp.chuNhiemHP.hoTen : '--'}">--</td>
                            <td>
                                <a th:if="${hp.fileDeCuong != null and !hp.fileDeCuong.isEmpty()}"
                                   th:href="@{'/uploads/' + ${hp.fileDeCuong}}" target="_blank"
                                   class="small text-decoration-none">
                                    <i class="bi bi-file-earmark-pdf me-1"></i>Xem
                                </a>
                                <span th:unless="${hp.fileDeCuong != null and !hp.fileDeCuong.isEmpty()}"
                                      class="text-muted small">--</span>
                            </td>
                            <td>
                                <span class="status-pill"
                                      th:with="s=${hp.trangThai?.name()}"
                                      th:classappend="${s == 'DaDuyet'  ? 'tone-success'  :
                                                       (s == 'ChoDuyet' ? 'tone-warning' :
                                                                          'tone-neutral')}">
                                    <span class="pill-dot" aria-hidden="true"></span>
                                    <span th:text="${s == 'DaDuyet'  ? 'Đã Duyệt' :
                                                   (s == 'ChoDuyet' ? 'Chờ Duyệt' : 'Bản Nháp')}">--</span>
                                </span>
                            </td>
                            <td class="text-center">
                                <div class="action-cluster">
                                    <a th:href="@{/hoc-phan/chi-tiet/{ma}(ma=${hp.maHocPhan})}"
                                       class="btn btn-sm btn-outline-secondary"
                                       data-bs-toggle="tooltip" data-bs-title="Chi Tiết">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                    <a th:if="${hp.trangThai?.name() != 'DaDuyet'}"
                                       th:href="@{/hoc-phan/sua/{ma}(ma=${hp.maHocPhan})}"
                                       class="btn btn-sm btn-outline-primary"
                                       sec:authorize="hasAnyRole('CNHP','ADMIN')"
                                       data-bs-toggle="tooltip" data-bs-title="Chỉnh sửa">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <form th:if="${hp.trangThai?.name() == 'BanNhap'}"
                                          th:action="@{/hoc-phan/gui-cho-duyet/{ma}(ma=${hp.maHocPhan})}"
                                          method="post" class="d-inline"
                                          sec:authorize="hasAnyRole('CNHP','ADMIN')">
                                        <input type="hidden" th:name="${_csrf.parameterName}"
                                                              th:value="${_csrf.token}">
                                        <button class="btn btn-sm btn-outline-info"
                                                data-bs-toggle="tooltip" data-bs-title="Gửi Chờ Duyệt">
                                            <i class="bi bi-send"></i>
                                        </button>
                                    </form>
                                    <form th:if="${hp.trangThai?.name() == 'ChoDuyet'}"
                                          th:action="@{/hoc-phan/phe-duyet/{ma}(ma=${hp.maHocPhan})}"
                                          method="post" class="d-inline"
                                          sec:authorize="hasAnyRole('TTDTXS','ADMIN')">
                                        <input type="hidden" th:name="${_csrf.parameterName}"
                                                              th:value="${_csrf.token}">
                                        <button class="btn btn-sm btn-outline-success"
                                                data-bs-toggle="tooltip" data-bs-title="Phê duyệt">
                                            <i class="bi bi-check-lg"></i>
                                        </button>
                                    </form>
                                    <button th:if="${hp.trangThai?.name() == 'ChoDuyet'}"
                                            class="btn btn-sm btn-outline-danger"
                                            data-bs-toggle="modal"
                                            th:data-bs-target="'#modalTuChoi-' + ${hp.maHocPhan}"
                                            sec:authorize="hasAnyRole('TTDTXS','ADMIN')"
                                            data-bs-title="Từ Chối">
                                        <i class="bi bi-x-lg"></i>
                                    </button>
                                </div>

                                <!-- Modal từ chối -->
                                <div class="modal fade"
                                     th:id="'modalTuChoi-' + ${hp.maHocPhan}"
                                     tabindex="-1" aria-hidden="true">
                                  <div class="modal-dialog">
                                    <form th:action="@{/hoc-phan/tu-choi/{ma}(ma=${hp.maHocPhan})}"
                                          method="post" class="modal-content text-start">
                                      <input type="hidden" th:name="${_csrf.parameterName}"
                                                            th:value="${_csrf.token}">
                                      <div class="modal-header">
                                        <h5 class="modal-title">Từ Chối Học Phần</h5>
                                        <button class="btn-close" data-bs-dismiss="modal"></button>
                                      </div>
                                      <div class="modal-body">
                                        <label class="form-label">Lý Do <span class="text-danger">*</span></label>
                                        <textarea class="form-control" name="lyDo" rows="3" required></textarea>
                                      </div>
                                      <div class="modal-footer">
                                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Huỷ</button>
                                        <button type="submit" class="btn btn-danger">Xác Nhận Từ Chối</button>
                                      </div>
                                    </form>
                                  </div>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>
</body>
</html>
