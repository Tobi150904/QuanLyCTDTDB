<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/base}">
<head><title>Quan Ly Hoc Phan</title></head>
<body>
<div layout:fragment="content">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/dashboard}">Trang Chu</a></li>
            <li class="breadcrumb-item active">Hoc Phan</li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-start mb-4">
        <div>
            <p class="page-subtitle">Hoc Vu</p>
            <h4 class="page-title">Quan Ly Hoc Phan</h4>
        </div>
        <a th:href="@{/hoc-phan/them}" class="btn btn-primary btn-sm"
           sec:authorize="hasAnyRole('CNHP','TTDTXS','ADMIN')">
            <i class="bi bi-plus-lg me-1"></i>Tao Hoc Phan
        </a>
    </div>

    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${successMsg}"></span>
        <button class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${errorMsg}"></span>
        <button class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card mb-4">
        <div class="card-body py-3">
            <form th:action="@{/hoc-phan}" method="get" class="row g-2">
                <div class="col-md-8">
                    <div class="input-group search-bar">
                        <span class="input-group-text"><i class="bi bi-search"></i></span>
                        <input type="text" name="keyword" th:value="${keyword}"
                               class="form-control" placeholder="Tim theo ma hoac ten hoc phan...">
                    </div>
                </div>
                <div class="col-auto">
                    <button class="btn btn-primary btn-sm">
                        <i class="bi bi-search me-1"></i>Tim
                    </button>
                    <a th:href="@{/hoc-phan}" class="btn btn-outline-secondary btn-sm ms-1">
                        <i class="bi bi-x-lg"></i>
                    </a>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span class="fw-semibold"><i class="bi bi-journal-text me-2"></i>Danh Sach Hoc Phan</span>
            <span class="badge bg-secondary" th:text="'Tong: ' + ${#lists.size(danhSach)}">0</span>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-bordered align-middle mb-0">
                    <thead>
                        <tr>
                            <th style="width:50px;">STT</th>
                            <th>Ma HP</th>
                            <th>Ten Hoc Phan</th>
                            <th class="text-center">TC</th>
                            <th>Loai</th>
                            <th>Chu Nhiem HP</th>
                            <th>De Cuong</th>
                            <th>Trang Thai</th>
                            <th class="text-center" style="width:200px;">Thao Tac</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(danhSach)}">
                            <td colspan="9" class="text-center py-5">
                                <i class="bi bi-inbox display-4 text-muted d-block mb-3"></i>
                                <p class="text-muted">Chua co hoc phan nao.</p>
                            </td>
                        </tr>
                        <tr th:each="hp, stat : ${danhSach}">
                            <td class="text-muted" th:text="${stat.index + 1}">1</td>
                            <td><code th:text="${hp.maHocPhan}"></code></td>
                            <td>
                                <a th:href="@{/hoc-phan/chi-tiet/{ma}(ma=${hp.maHocPhan})}"
                                   class="text-decoration-none fw-medium"
                                   th:text="${hp.tenHocPhan}"></a>
                            </td>
                            <td class="text-center">
                                <span class="badge bg-primary" th:text="${hp.soTinChi}">0</span>
                            </td>
                            <td class="small text-muted" th:text="${hp.loaiHocPhan?.name() ?: '--'}">--</td>
                            <td class="small"
                                th:text="${hp.chuNhiemHP != null and hp.chuNhiemHP.nguoiDung != null
                                    ? hp.chuNhiemHP.nguoiDung.hoTen : (hp.chuNhiemHP != null ? hp.chuNhiemHP.maGV : '--')}">--</td>
                            <td>
                                <a th:if="${hp.fileDeCuong != null and !hp.fileDeCuong.isEmpty()}"
                                   th:href="@{'/files/' + ${hp.fileDeCuong}}" target="_blank"
                                   class="small text-decoration-none">
                                    <i class="bi bi-file-earmark-pdf me-1"></i>Xem
                                </a>
                                <span th:unless="${hp.fileDeCuong != null and !hp.fileDeCuong.isEmpty()}"
                                      class="text-muted small">--</span>
                            </td>
                            <td>
                                <span class="badge"
                                      th:classappend="${hp.trangThai?.name() == 'DaDuyet'} ? 'bg-success' :
                                                     (${hp.trangThai?.name() == 'ChoDuyet'} ? 'bg-warning text-dark' : 'bg-secondary')"
                                      th:text="${hp.trangThai?.name() ?: 'BanNhap'}">--</span>
                            </td>
                            <td class="text-center">
                                <div class="d-flex gap-1 justify-content-center flex-wrap">
                                    <a th:href="@{/hoc-phan/chi-tiet/{ma}(ma=${hp.maHocPhan})}"
                                       class="btn btn-sm btn-outline-secondary"
                                       data-bs-toggle="tooltip" data-bs-title="Chi Tiet">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                    <a th:if="${hp.trangThai?.name() != 'DaDuyet'}"
                                       th:href="@{/hoc-phan/sua/{ma}(ma=${hp.maHocPhan})}"
                                       class="btn btn-sm btn-outline-primary"
                                       sec:authorize="hasAnyRole('CNHP','ADMIN')"
                                       data-bs-toggle="tooltip" data-bs-title="Sua">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <form th:if="${hp.trangThai?.name() == 'BanNhap'}"
                                          th:action="@{/hoc-phan/gui-cho-duyet/{ma}(ma=${hp.maHocPhan})}"
                                          method="post" class="d-inline"
                                          sec:authorize="hasAnyRole('CNHP','ADMIN')">
                                        <input type="hidden" th:name="${_csrf.parameterName}"
                                                              th:value="${_csrf.token}">
                                        <button class="btn btn-sm btn-outline-info"
                                                data-bs-toggle="tooltip" data-bs-title="Gui Cho Duyet">
                                            <i class="bi bi-send"></i>
                                        </button>
                                    </form>
                                    <form th:if="${hp.trangThai?.name() == 'ChoDuyet'}"
                                          th:action="@{/hoc-phan/phe-duyet/{ma}(ma=${hp.maHocPhan})}"
                                          method="post" class="d-inline"
                                          sec:authorize="hasAnyRole('TTDTXS','ADMIN')">
                                        <input type="hidden" th:name="${_csrf.parameterName}"
                                                              th:value="${_csrf.token}">
                                        <button class="btn btn-sm btn-outline-success"
                                                data-bs-toggle="tooltip" data-bs-title="Phe Duyet">
                                            <i class="bi bi-check-lg"></i>
                                        </button>
                                    </form>
                                    <button th:if="${hp.trangThai?.name() == 'ChoDuyet'}"
                                            class="btn btn-sm btn-outline-danger"
                                            data-bs-toggle="modal"
                                            th:data-bs-target="'#modalTuChoi-' + ${hp.maHocPhan}"
                                            sec:authorize="hasAnyRole('TTDTXS','ADMIN')"
                                            data-bs-title="Tu Choi">
                                        <i class="bi bi-x-lg"></i>
                                    </button>
                                </div>

                                <!-- Modal tu choi -->
                                <div class="modal fade"
                                     th:id="'modalTuChoi-' + ${hp.maHocPhan}"
                                     tabindex="-1" aria-hidden="true">
                                  <div class="modal-dialog">
                                    <form th:action="@{/hoc-phan/tu-choi/{ma}(ma=${hp.maHocPhan})}"
                                          method="post" class="modal-content text-start">
                                      <input type="hidden" th:name="${_csrf.parameterName}"
                                                            th:value="${_csrf.token}">
                                      <div class="modal-header">
                                        <h5 class="modal-title">Tu Choi Hoc Phan</h5>
                                        <button class="btn-close" data-bs-dismiss="modal"></button>
                                      </div>
                                      <div class="modal-body">
                                        <label class="form-label">Ly Do <span class="text-danger">*</span></label>
                                        <textarea class="form-control" name="lyDo" rows="3" required></textarea>
                                      </div>
                                      <div class="modal-footer">
                                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Huy</button>
                                        <button type="submit" class="btn btn-danger">Xac Nhan Tu Choi</button>
                                      </div>
                                    </form>
                                  </div>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>
</body>
</html>
