<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="${isEdit} ? 'Chỉnh Sửa Doanh Nghiệp' : 'Thêm Doanh Nghiệp'">Form Doanh Nghiệp</title>
</head>
<body>
<div layout:fragment="content">

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item">
                <a th:href="@{/dashboard}" class="text-decoration-none">
                    <i class="bi bi-house-door me-1"></i>Trang Chủ
                </a>
            </li>
            <li class="breadcrumb-item">
                <a th:href="@{/doanh-nghiep}" class="text-decoration-none">Doanh Nghiệp</a>
            </li>
            <li class="breadcrumb-item active" aria-current="page"
                th:text="${isEdit} ? 'Chỉnh Sửa' : 'Thêm Mới'">Form</li>
        </ol>
    </nav>

    <!-- Page Header -->
    <div class="d-flex justify-content-between align-items-start mb-4">
        <div>
            <p class="page-subtitle">Quản Trị / Doanh Nghiệp</p>
            <h4 class="page-title mb-0"
                th:text="${isEdit} ? 'Chỉnh Sửa Doanh Nghiệp' : 'Thêm Doanh Nghiệp Mới'">
                Form Doanh Nghiệp
            </h4>
        </div>
        <a th:href="@{/doanh-nghiep}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i>Quay Lại
        </a>
    </div>

    <!-- Form Card -->
    <div class="card" style="max-width:820px;">
        <div class="card-header">
            <i class="bi bi-building me-2"></i>
            <span class="fw-semibold"
                  th:text="${isEdit} ? 'Thông Tin Doanh Nghiệp' : 'Tạo Doanh Nghiệp Mới'">
                Thông Tin
            </span>
        </div>
        <div class="card-body">

            <form th:action="${isEdit} ? @{/doanh-nghiep/sua/{ma}(ma=${doanhNghiepDTO.maDoanhNghiep})} : @{/doanh-nghiep/them}"
                  th:object="${doanhNghiepDTO}"
                  method="post"
                  novalidate>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <!-- Section: Thông tin cơ bản -->
                <h6 class="section-label">Thông Tin Cơ Bản</h6>

                <div class="row g-3 mb-3">
                    <!-- Mã DN -->
                    <div class="col-md-4">
                        <div class="form-floating">
                            <input type="text"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('maDoanhNghiep')} ? 'is-invalid'"
                                   id="maDoanhNghiep"
                                   th:field="*{maDoanhNghiep}"
                                   placeholder="Mã DN"
                                   maxlength="20"
                                   th:readonly="${isEdit}">
                            <label for="maDoanhNghiep">
                                Mã Doanh Nghiệp
                                <span class="text-muted small" th:unless="${isEdit}">(để trống để tự sinh)</span>
                            </label>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('maDoanhNghiep')}"
                                 th:errors="*{maDoanhNghiep}"></div>
                        </div>
                    </div>

                    <!-- Tên DN -->
                    <div class="col-md-8">
                        <div class="form-floating">
                            <input type="text"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('tenDoanhNghiep')} ? 'is-invalid'"
                                   id="tenDoanhNghiep"
                                   th:field="*{tenDoanhNghiep}"
                                   placeholder="Tên Doanh Nghiệp"
                                   maxlength="200"
                                   required>
                            <label for="tenDoanhNghiep">
                                Tên Doanh Nghiệp <span class="text-danger">*</span>
                            </label>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('tenDoanhNghiep')}"
                                 th:errors="*{tenDoanhNghiep}"></div>
                        </div>
                    </div>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-8">
                        <div class="form-floating">
                            <input type="text"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('linhVuc')} ? 'is-invalid'"
                                   id="linhVuc"
                                   th:field="*{linhVuc}"
                                   placeholder="Lĩnh vực hoạt động"
                                   maxlength="200">
                            <label for="linhVuc">Lĩnh Vực Hoạt Động</label>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('linhVuc')}"
                                 th:errors="*{linhVuc}"></div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-floating">
                            <select class="form-select" id="trangThai" th:field="*{trangThai}">
                                <option th:each="tt : ${trangThaiList}"
                                        th:value="${tt.name()}"
                                        th:text="${tt.name() == 'DangHopTac' ? 'Đang Hợp Tác' : 'Tạm Ngưng'}">
                                </option>
                            </select>
                            <label for="trangThai">Trạng Thái</label>
                        </div>
                    </div>
                </div>

                <!-- Section: Liên hệ -->
                <h6 class="section-label">Thông Tin Liên Hệ</h6>

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="text"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('nguoiDaiDien')} ? 'is-invalid'"
                                   id="nguoiDaiDien"
                                   th:field="*{nguoiDaiDien}"
                                   placeholder="Người đại diện"
                                   maxlength="100">
                            <label for="nguoiDaiDien">Người Đại Diện</label>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('nguoiDaiDien')}"
                                 th:errors="*{nguoiDaiDien}"></div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="tel"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('soDienThoai')} ? 'is-invalid'"
                                   id="soDienThoai"
                                   th:field="*{soDienThoai}"
                                   placeholder="Số điện thoại"
                                   maxlength="15">
                            <label for="soDienThoai">Số Điện Thoại</label>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('soDienThoai')}"
                                 th:errors="*{soDienThoai}"></div>
                        </div>
                    </div>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="email"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                   id="email"
                                   th:field="*{email}"
                                   placeholder="Email"
                                   maxlength="100">
                            <label for="email">Email</label>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('email')}"
                                 th:errors="*{email}"></div>
                        </div>
                    </div>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-12">
                        <div class="form-floating">
                            <textarea class="form-control"
                                      th:classappend="${#fields.hasErrors('diaChiDN')} ? 'is-invalid'"
                                      id="diaChiDN"
                                      th:field="*{diaChiDN}"
                                      placeholder="Địa chỉ"
                                      maxlength="255"
                                      style="height: 80px;"></textarea>
                            <label for="diaChiDN">Địa Chỉ</label>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('diaChiDN')}"
                                 th:errors="*{diaChiDN}"></div>
                        </div>
                    </div>
                </div>

                <!-- Buttons -->
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary" onclick="showLoading(this)">
                        <span class="spinner-border spinner-border-sm d-none me-1" role="status"></span>
                        <i class="bi bi-save me-1"></i>
                        <span th:text="${isEdit} ? 'Cập Nhật' : 'Tạo Mới'">Lưu</span>
                    </button>
                    <a th:href="@{/doanh-nghiep}" class="btn btn-outline-secondary">
                        <i class="bi bi-x-lg me-1"></i>Huỷ
                    </a>
                </div>
            </form>
        </div>
    </div>

</div>
</body>
</html>
