<!DOCTYPE html>
<!--/*
 * doanh-nghiep/form.html — Phase 5 redesign
 *
 * Form Doanh Nghiep chia 2 section:
 *   1. Thong tin co ban
 *   2. Lien he & dia chi
 */-->
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="${isEdit} ? 'Chỉnh Sửa Doanh Nghiệp' : 'Thêm Doanh Nghiệp'">Form Doanh Nghiệp</title>
</head>
<body>
<div layout:fragment="content">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item">
                <a th:href="@{/dashboard}" class="text-decoration-none">
                    <i class="bi bi-house-door me-1"></i>Trang Chủ
                </a>
            </li>
            <li class="breadcrumb-item">
                <a th:href="@{/doanh-nghiep}" class="text-decoration-none">Doanh Nghiệp</a>
            </li>
            <li class="breadcrumb-item active" aria-current="page"
                th:text="${isEdit} ? 'Chỉnh Sửa' : 'Thêm Mới'">Form</li>
        </ol>
    </nav>

    <div class="page-header-block mb-4">
        <div class="d-flex justify-content-between align-items-start gap-3 flex-wrap">
            <div class="flex-grow-1 min-w-0">
                <p class="page-subtitle">Quản Trị / Doanh Nghiệp</p>
                <h1 class="page-title h4 mb-1 d-flex align-items-center gap-2">
                    <i class="bi bi-building" aria-hidden="true"></i>
                    <span th:text="${isEdit} ? 'Chỉnh Sửa Doanh Nghiệp' : 'Thêm Doanh Nghiệp Mới'">Form Doanh Nghiệp</span>
                </h1>
                <p class="text-muted small mb-0"
                   th:text="${isEdit} ? 'Cập nhật thông tin & trạng thái hợp tác.' :
                                        'Khai báo doanh nghiệp đối tác để gắn vào các đợt kiến tập / thực tập.'">Mô tả</p>
            </div>
            <div class="action-slot d-flex align-items-center gap-2 flex-wrap">
                <a th:href="@{/doanh-nghiep}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left me-1"></i>Quay Lại
                </a>
            </div>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-xl-9">

            <form th:action="${isEdit} ? @{/doanh-nghiep/sua/{ma}(ma=${doanhNghiepDTO.maDoanhNghiep})} : @{/doanh-nghiep/them}"
                  th:object="${doanhNghiepDTO}"
                  method="post"
                  data-unsaved-guard
                  novalidate>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <!-- Banner loi validation -->
                <div th:if="${#fields.hasErrors('*')}"
                     class="alert alert-warning form-alert d-flex align-items-start mb-3" role="alert">
                    <i class="bi bi-info-circle-fill me-2 mt-1"></i>
                    <div>
                        <strong class="d-block">Vui lòng kiểm tra lại:</strong>
                        <ul>
                            <li th:each="err : ${#fields.allErrors()}" th:text="${err}"></li>
                        </ul>
                    </div>
                </div>

                <!-- SECTION 1 — Thong tin co ban -->
                <div class="form-section">
                    <div class="form-section-header">
                        <i class="bi bi-buildings" aria-hidden="true"></i>
                        <span>Thông Tin Doanh Nghiệp</span>
                        <small class="form-section-hint">Bắt buộc</small>
                    </div>
                    <div class="form-section-body">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <div class="form-floating">
                                    <input type="text"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('maDoanhNghiep')} ? 'is-invalid'"
                                           id="maDoanhNghiep"
                                           th:field="*{maDoanhNghiep}"
                                           placeholder="Mã DN"
                                           maxlength="20"
                                           th:readonly="${isEdit}">
                                    <label for="maDoanhNghiep">Mã Doanh Nghiệp</label>
                                    <div class="invalid-feedback"
                                         th:if="${#fields.hasErrors('maDoanhNghiep')}"
                                         th:errors="*{maDoanhNghiep}"></div>
                                </div>
                                <small class="form-text text-muted" th:unless="${isEdit}">
                                    <i class="bi bi-info-circle me-1"></i>
                                    Để trống để hệ thống tự sinh.
                                </small>
                            </div>

                            <div class="col-md-8">
                                <div class="form-floating">
                                    <input type="text"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('tenDoanhNghiep')} ? 'is-invalid'"
                                           id="tenDoanhNghiep"
                                           th:field="*{tenDoanhNghiep}"
                                           placeholder="Tên Doanh Nghiệp"
                                           maxlength="200"
                                           aria-required="true" required>
                                    <label for="tenDoanhNghiep">
                                        Tên Doanh Nghiệp <span class="req-mark">*</span>
                                    </label>
                                    <div class="invalid-feedback"
                                         th:if="${#fields.hasErrors('tenDoanhNghiep')}"
                                         th:errors="*{tenDoanhNghiep}"></div>
                                </div>
                            </div>

                            <div class="col-md-8">
                                <div class="form-floating">
                                    <input type="text"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('linhVuc')} ? 'is-invalid'"
                                           id="linhVuc"
                                           th:field="*{linhVuc}"
                                           placeholder="Lĩnh vực hoạt động"
                                           maxlength="200">
                                    <label for="linhVuc">Lĩnh Vực Hoạt Động</label>
                                    <div class="invalid-feedback"
                                         th:if="${#fields.hasErrors('linhVuc')}"
                                         th:errors="*{linhVuc}"></div>
                                </div>
                            </div>

                            <div class="col-md-4">
                                <div class="form-floating">
                                    <select class="form-select" id="trangThai" th:field="*{trangThai}">
                                        <option th:each="tt : ${trangThaiList}"
                                                th:value="${tt.name()}"
                                                th:text="${tt.name() == 'DangHopTac' ? 'Đang Hợp Tác' : 'Tạm Ngưng'}">
                                        </option>
                                    </select>
                                    <label for="trangThai">Trạng Thái</label>
                                </div>
                                <small class="form-text text-muted">
                                    <i class="bi bi-info-circle me-1"></i>
                                    DN tạm ngưng sẽ không xuất hiện ở form đợt KT/TT.
                                </small>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- SECTION 2 — Lien he & dia chi -->
                <div class="form-section">
                    <div class="form-section-header">
                        <i class="bi bi-telephone" aria-hidden="true"></i>
                        <span>Liên Hệ &amp; Địa Chỉ</span>
                    </div>
                    <div class="form-section-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('nguoiDaiDien')} ? 'is-invalid'"
                                           id="nguoiDaiDien"
                                           th:field="*{nguoiDaiDien}"
                                           placeholder="Người đại diện"
                                           autocomplete="name"
                                           maxlength="100">
                                    <label for="nguoiDaiDien">Người Đại Diện</label>
                                    <div class="invalid-feedback"
                                         th:if="${#fields.hasErrors('nguoiDaiDien')}"
                                         th:errors="*{nguoiDaiDien}"></div>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="tel"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('soDienThoai')} ? 'is-invalid'"
                                           id="soDienThoai"
                                           th:field="*{soDienThoai}"
                                           placeholder="Số điện thoại"
                                           autocomplete="tel"
                                           maxlength="15">
                                    <label for="soDienThoai">Số Điện Thoại</label>
                                    <div class="invalid-feedback"
                                         th:if="${#fields.hasErrors('soDienThoai')}"
                                         th:errors="*{soDienThoai}"></div>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="email"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                           id="email"
                                           th:field="*{email}"
                                           placeholder="Email"
                                           autocomplete="email"
                                           maxlength="100">
                                    <label for="email">Email</label>
                                    <div class="invalid-feedback"
                                         th:if="${#fields.hasErrors('email')}"
                                         th:errors="*{email}"></div>
                                </div>
                            </div>

                            <div class="col-12">
                                <div class="form-floating">
                                    <textarea class="form-control"
                                              th:classappend="${#fields.hasErrors('diaChiDN')} ? 'is-invalid'"
                                              id="diaChiDN"
                                              th:field="*{diaChiDN}"
                                              placeholder="Địa chỉ"
                                              maxlength="255"
                                              style="height: 90px;"></textarea>
                                    <label for="diaChiDN">Địa Chỉ</label>
                                    <div class="invalid-feedback"
                                         th:if="${#fields.hasErrors('diaChiDN')}"
                                         th:errors="*{diaChiDN}"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Sticky footer -->
                <div class="form-sticky-footer mt-3">
                    <a th:href="@{/doanh-nghiep}" class="btn btn-outline-secondary">
                        <i class="bi bi-x-lg me-1"></i>Huỷ
                    </a>
                    <button type="submit" class="btn btn-primary" onclick="showLoading(this)">
                        <span class="spinner-border spinner-border-sm d-none me-1" role="status"></span>
                        <i class="bi bi-save me-1"></i>
                        <span th:text="${isEdit} ? 'Cập Nhật' : 'Tạo Mới'">Lưu</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

</div>
</body>
</html>
