<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/base}">
<head><title>Quan Ly Doanh Nghiep</title></head>
<body>
<div layout:fragment="content">

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item">
                <a th:href="@{/dashboard}" class="text-decoration-none">
                    <i class="bi bi-house-door me-1"></i>Trang Chu
                </a>
            </li>
            <li class="breadcrumb-item active" aria-current="page">Doanh Nghiep</li>
        </ol>
    </nav>

    <!-- Page Header -->
    <div class="d-flex justify-content-between align-items-start mb-4">
        <div>
            <p class="page-subtitle">Quan Tri</p>
            <h4 class="page-title">Quan Ly Doanh Nghiep</h4>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/doanh-nghiep/them}" class="btn btn-primary btn-sm">
                <i class="bi bi-plus-lg me-1"></i>Them Moi
            </a>
        </div>
    </div>

    <!-- Stat summary -->
    <div class="row g-3 mb-4">
        <div class="col-6 col-md-4">
            <div class="stat-card">
                <div class="stat-card-icon"><i class="bi bi-building"></i></div>
                <div>
                    <div class="stat-card-value" th:text="${thongKe['tongDoanhNghiep'] ?: 0}">0</div>
                    <div class="stat-card-label">Tong Cong</div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-4">
            <div class="stat-card">
                <div class="stat-card-icon"><i class="bi bi-check-circle"></i></div>
                <div>
                    <div class="stat-card-value" th:text="${thongKe['dangHopTac'] ?: 0}">0</div>
                    <div class="stat-card-label">Dang Hop Tac</div>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-4">
            <div class="stat-card">
                <div class="stat-card-icon"><i class="bi bi-pause-circle"></i></div>
                <div>
                    <div class="stat-card-value" th:text="${thongKe['tamNgung'] ?: 0}">0</div>
                    <div class="stat-card-label">Tam Ngung</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Search & Filter -->
    <div class="card mb-4">
        <div class="card-body py-3">
            <form th:action="@{/doanh-nghiep}" method="get" class="row g-2 align-items-end">
                <div class="col-12 col-md-6">
                    <div class="input-group search-bar">
                        <span class="input-group-text"><i class="bi bi-search"></i></span>
                        <input type="text"
                               class="form-control"
                               name="keyword"
                               th:value="${keyword}"
                               placeholder="Tim ten, linh vuc, nguoi dai dien, email...">
                    </div>
                </div>
                <div class="col-12 col-md-3">
                    <select class="form-select form-select-sm" name="trangThai">
                        <option value="">-- Tat Ca Trang Thai --</option>
                        <option th:each="tt : ${trangThaiList}"
                                th:value="${tt.name()}"
                                th:text="${tt.name()}"
                                th:selected="${trangThaiFilter != null and trangThaiFilter == tt}">
                        </option>
                    </select>
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary btn-sm">
                        <i class="bi bi-search me-1"></i>Tim Kiem
                    </button>
                    <a th:href="@{/doanh-nghiep}" class="btn btn-outline-secondary btn-sm ms-1">
                        <i class="bi bi-x-lg"></i>
                    </a>
                </div>
            </form>
        </div>
    </div>

    <!-- Table -->
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span class="fw-semibold">
                <i class="bi bi-table me-2"></i>Danh Sach Doanh Nghiep
            </span>
            <span class="badge bg-secondary" th:if="${pages != null}"
                  th:text="'Tong: ' + ${pages.totalElements}">0</span>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-bordered align-middle mb-0">
                    <thead>
                        <tr>
                            <th style="width:50px;">STT</th>
                            <th>Ma</th>
                            <th>Ten Doanh Nghiep</th>
                            <th>Linh Vuc</th>
                            <th>Nguoi Dai Dien</th>
                            <th>Lien He</th>
                            <th>Trang Thai</th>
                            <th class="text-center" style="width:130px;">Thao Tac</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Empty state -->
                        <tr th:if="${pages == null or pages.isEmpty()}">
                            <td colspan="8" class="text-center py-5">
                                <i class="bi bi-inbox display-4 text-muted d-block mb-3"></i>
                                <p class="text-muted mb-3">Chua co doanh nghiep nao.</p>
                                <a th:href="@{/doanh-nghiep/them}" class="btn btn-primary btn-sm">
                                    <i class="bi bi-plus-lg me-1"></i>Them Moi
                                </a>
                            </td>
                        </tr>
                        <!-- Data rows -->
                        <tr th:each="dn, stat : ${pages}">
                            <td class="text-muted"
                                th:text="${pages.number * pages.size + stat.index + 1}">1</td>
                            <td><code th:text="${dn.maDoanhNghiep}"></code></td>
                            <td>
                                <a th:href="@{/doanh-nghiep/chi-tiet/{ma}(ma=${dn.maDoanhNghiep})}"
                                   class="text-decoration-none fw-medium"
                                   th:text="${dn.tenDoanhNghiep}">
                                </a>
                            </td>
                            <td class="small text-muted" th:text="${dn.linhVuc ?: '--'}"></td>
                            <td th:text="${dn.nguoiDaiDien ?: '--'}"></td>
                            <td class="small">
                                <div th:if="${dn.email != null and !dn.email.isEmpty()}">
                                    <i class="bi bi-envelope me-1 text-muted"></i>
                                    <a th:href="'mailto:' + ${dn.email}"
                                       th:text="${dn.email}"
                                       class="text-decoration-none"></a>
                                </div>
                                <div th:if="${dn.soDienThoai != null and !dn.soDienThoai.isEmpty()}"
                                     class="text-muted">
                                    <i class="bi bi-telephone me-1"></i>
                                    <span th:text="${dn.soDienThoai}"></span>
                                </div>
                            </td>
                            <td>
                                <span class="badge"
                                      th:classappend="${dn.trangThai.name() == 'DangHopTac'} ? 'bg-success' : 'bg-secondary'"
                                      th:text="${dn.trangThai.name() == 'DangHopTac'} ? 'Dang Hop Tac' : 'Tam Ngung'">
                                </span>
                            </td>
                            <td class="text-center">
                                <div class="d-flex gap-1 justify-content-center">
                                    <a th:href="@{/doanh-nghiep/chi-tiet/{ma}(ma=${dn.maDoanhNghiep})}"
                                       class="btn btn-sm btn-outline-secondary"
                                       data-bs-toggle="tooltip" data-bs-title="Chi Tiet">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                    <a th:href="@{/doanh-nghiep/sua/{ma}(ma=${dn.maDoanhNghiep})}"
                                       class="btn btn-sm btn-outline-primary"
                                       data-bs-toggle="tooltip" data-bs-title="Chinh Sua">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <form th:action="@{/doanh-nghiep/doi-trang-thai/{ma}(ma=${dn.maDoanhNghiep})}"
                                          method="post">
                                        <input type="hidden"
                                               th:name="${_csrf.parameterName}"
                                               th:value="${_csrf.token}">
                                        <button type="submit"
                                                class="btn btn-sm"
                                                th:classappend="${dn.trangThai.name() == 'DangHopTac'} ? 'btn-outline-warning' : 'btn-outline-success'"
                                                th:data-bs-title="${dn.trangThai.name() == 'DangHopTac'} ? 'Tam Ngung' : 'Kich Hoat'"
                                                data-bs-toggle="tooltip">
                                            <i class="bi"
                                               th:classappend="${dn.trangThai.name() == 'DangHopTac'} ? 'bi-pause' : 'bi-play'">
                                            </i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Pagination -->
        <div class="card-footer bg-transparent" th:if="${pages != null and pages.totalPages > 1}">
            <nav>
                <ul class="pagination pagination-sm justify-content-end mb-0">
                    <li class="page-item" th:classappend="${pages.first} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/doanh-nghiep(page=${pages.number - 1}, keyword=${keyword}, trangThai=${trangThaiFilter})}">
                            <i class="bi bi-chevron-left"></i>
                        </a>
                    </li>
                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, pages.totalPages - 1)}"
                        th:classappend="${i == pages.number} ? 'active'">
                        <a class="page-link"
                           th:href="@{/doanh-nghiep(page=${i}, keyword=${keyword}, trangThai=${trangThaiFilter})}"
                           th:text="${i + 1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${pages.last} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/doanh-nghiep(page=${pages.number + 1}, keyword=${keyword}, trangThai=${trangThaiFilter})}">
                            <i class="bi bi-chevron-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

</div>
</body>
</html>
