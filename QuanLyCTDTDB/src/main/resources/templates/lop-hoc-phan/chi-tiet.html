<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/base}">
<head><title>Chi Tiết Lớp Học Phần</title></head>
<body>
<div layout:fragment="content">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item">
                <a th:href="@{/dashboard}"><i class="bi bi-house-door me-1"></i>Trang Chủ</a>
            </li>
            <li class="breadcrumb-item">
                <a th:href="@{/lop-hoc-phan}">Lớp Học Phần</a>
            </li>
            <li class="breadcrumb-item active">Chi Tiết</li>
        </ol>
    </nav>

    <!-- DETAIL HERO -->
    <section class="detail-hero">
        <div class="d-flex flex-wrap justify-content-between gap-3 align-items-start">
            <div style="min-width: 240px; flex: 1 1 60%;">
                <p class="detail-hero-eyebrow">Đào Tạo / Lớp Học Phần</p>
                <h1 class="detail-hero-title">
                    Lớp Nhóm <span th:text="'N' + ${lopId.maLopHocPhan}">N1</span>
                </h1>
                <div class="detail-hero-meta">
                    <span><i class="bi bi-mortarboard"></i>CTĐT
                        <code th:text="${lopId.maCTDT}">--</code></span>
                    <span><i class="bi bi-journal-text"></i>HP
                        <code th:text="${lopId.maHocPhan}">--</code></span>
                    <span><i class="bi bi-calendar3"></i>HK
                        <code th:text="${lopId.maHocKy}">--</code></span>
                    <span><i class="bi bi-people"></i>
                        <strong th:text="${#lists.size(danhSachSV)}">0</strong>&nbsp;SV</span>
                </div>
            </div>
            <div class="detail-hero-actions">
                <a th:href="@{/lop-hoc-phan(maCTDT=${lopId.maCTDT},maHocKy=${lopId.maHocKy})}"
                   class="btn btn-outline-light btn-sm">
                    <i class="bi bi-arrow-left me-1"></i>Quay Lại
                </a>
            </div>
        </div>
    </section>

    <!-- Flash messages da duoc render boi layout/base.html -->


    <div class="row g-4">
        <!-- DS SV TRONG LỚP -->
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span class="fw-semibold">
                        <i class="bi bi-people me-2"></i>Danh Sách Sinh Viên
                    </span>
                    <span class="badge bg-light"
                          th:text="'Tổng: ' + ${#lists.size(danhSachSV)}">0</span>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead>
                                <tr>
                                    <th style="width:50px;">STT</th>
                                    <th>Mã SV</th>
                                    <th>Họ Tên</th>
                                    <th class="text-center">Trạng Thái</th>
                                    <th>Nhận Xét</th>
                                    <th class="text-center" style="width:140px;">Thao Tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${#lists.isEmpty(danhSachSV)}">
                                    <td colspan="6">
                                        <div class="empty-state">
                                            <i class="bi bi-person-x"></i>
                                            <p>Chưa có sinh viên nào đăng ký lớp này.</p>
                                        </div>
                                    </td>
                                </tr>
                                <tr th:each="ds, stat : ${danhSachSV}">
                                    <td class="text-muted" th:text="${stat.index + 1}">1</td>
                                    <td><code th:text="${ds.sinhVien.maSV}"></code></td>
                                    <td class="fw-medium"
                                        th:text="${ds.sinhVien.nguoiDung != null
                                            ? ds.sinhVien.nguoiDung.hoTen
                                            : ds.sinhVien.maSV}">--</td>
                                    <td class="text-center">
                                        <span class="status-pill"
                                              th:classappend="${ds.daCanhBao} ? 'tone-warning' : 'tone-success'">
                                            <span class="pill-dot" aria-hidden="true"
                                                  th:unless="${ds.daCanhBao}"></span>
                                            <i class="bi bi-exclamation-triangle-fill"
                                               aria-hidden="true"
                                               th:if="${ds.daCanhBao}"></i>
                                            <span th:text="${ds.daCanhBao} ? 'Đã Cảnh Báo' : 'Bình Thường'">--</span>
                                        </span>
                                    </td>
                                    <td class="small text-muted"
                                        th:text="${ds.nhanXet ?: '--'}">--</td>
                                    <td class="text-center">
                                        <button th:unless="${ds.daCanhBao}"
                                                class="btn btn-sm btn-outline-warning"
                                                sec:authorize="hasAnyRole('GIANG_VIEN','CVHT','ADMIN')"
                                                data-bs-toggle="modal"
                                                th:data-bs-target="'#modalCB-' + ${ds.sinhVien.maSV}"
                                                data-bs-title="Cảnh Báo">
                                            <i class="bi bi-exclamation-triangle me-1"></i>Cảnh Báo
                                        </button>

                                        <!-- Modal cảnh báo SV -->
                                        <div class="modal fade"
                                             th:id="'modalCB-' + ${ds.sinhVien.maSV}"
                                             tabindex="-1" aria-hidden="true">
                                            <div class="modal-dialog">
                                                <form th:action="@{/lop-hoc-phan/canh-bao-sv}" method="post"
                                                      class="modal-content text-start">
                                                    <input type="hidden" th:name="${_csrf.parameterName}"
                                                                          th:value="${_csrf.token}">
                                                    <input type="hidden" name="maCTDT"    th:value="${lopId.maCTDT}">
                                                    <input type="hidden" name="maHocPhan" th:value="${lopId.maHocPhan}">
                                                    <input type="hidden" name="maHocKy"   th:value="${lopId.maHocKy}">
                                                    <input type="hidden" name="maLop"     th:value="${lopId.maLopHocPhan}">
                                                    <input type="hidden" name="maSV"      th:value="${ds.sinhVien.maSV}">
                                                    <div class="modal-header">
                                                        <h5 class="modal-title">Cảnh Báo Sinh Viên</h5>
                                                        <button class="btn-close" data-bs-dismiss="modal"></button>
                                                    </div>
                                                    <div class="modal-body">
                                                        <div class="mb-3">
                                                            <label class="form-label">Sinh Viên</label>
                                                            <input type="text" class="form-control-plaintext"
                                                                   readonly
                                                                   th:value="${ds.sinhVien.maSV + ' - ' +
                                                                     (ds.sinhVien.nguoiDung != null
                                                                       ? ds.sinhVien.nguoiDung.hoTen
                                                                       : ds.sinhVien.maSV)}">
                                                        </div>
                                                        <div class="mb-3">
                                                            <label class="form-label">Nhận Xét <span class="text-danger">*</span></label>
                                                            <textarea class="form-control" name="nhanXet"
                                                                      rows="3" required></textarea>
                                                        </div>
                                                        <div class="mb-3">
                                                            <label class="form-label">Email CVHT <span class="text-danger">*</span></label>
                                                            <input type="email" class="form-control"
                                                                   name="emailCVHT" required
                                                                   placeholder="email-cvht@ntu.edu.vn">
                                                        </div>
                                                    </div>
                                                    <div class="modal-footer">
                                                        <button type="button" class="btn btn-outline-secondary"
                                                                data-bs-dismiss="modal">Huỷ</button>
                                                        <button type="submit" class="btn btn-warning">
                                                            <i class="bi bi-send me-1"></i>Gửi Cảnh Báo
                                                        </button>
                                                    </div>
                                                </form>
                                            </div>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- ĐĂNG KÝ SV -->
        <div class="col-lg-4" sec:authorize="hasAnyRole('PDT','TTDTXS','ADMIN')">
            <div class="card sticky-top" style="top: 1rem;">
                <div class="card-header">
                    <i class="bi bi-person-plus"></i>
                    <span class="fw-semibold">Đăng Ký Sinh Viên</span>
                </div>
                <div class="card-body">
                    <form th:action="@{/lop-hoc-phan/dang-ky-sv}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}"
                                              th:value="${_csrf.token}">
                        <input type="hidden" name="maCTDT"    th:value="${lopId.maCTDT}">
                        <input type="hidden" name="maHocPhan" th:value="${lopId.maHocPhan}">
                        <input type="hidden" name="maHocKy"   th:value="${lopId.maHocKy}">
                        <input type="hidden" name="maLop"     th:value="${lopId.maLopHocPhan}">

                        <div class="mb-3">
                            <label class="form-label fw-medium small">
                                Mã Sinh Viên <span class="text-danger">*</span>
                            </label>
                            <input type="text" class="form-control" name="maSV"
                                   placeholder="Nhập mã SV..." required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-plus-lg me-1"></i>Đăng Ký
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
