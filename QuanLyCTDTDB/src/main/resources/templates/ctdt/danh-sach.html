<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="vi">
<head th:replace="~{layout/base :: head('Chuong Trinh Dao Tao')}"></head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>

<div class="layout">
    <aside th:replace="~{layout/base :: sidebar('ctdt')}"></aside>

    <main class="main-content">

        <!-- HEADER -->
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
            <div>
                <div class="page-subtitle">Module / Dao tao</div>
                <h4 class="page-title mb-0">Chuong Trinh Dao Tao</h4>
            </div>
            <a sec:authorize="hasAnyRole('PDT','ADMIN')"
               th:href="@{/ctdt/them}" class="btn btn-primary-brand">
                <i class="bi bi-plus-lg me-1"></i> Tao CTDT Moi
            </a>
        </div>

        <!-- FLASH MSG -->
        <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle me-2"></i><span th:text="${successMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${errorMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- BANG DS -->
        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table align-middle mb-0">
                        <thead>
                            <tr>
                                <th style="width:110px;">Ma</th>
                                <th>Ten Chuong Trinh</th>
                                <th>Khoa</th>
                                <th class="text-center">So HP</th>
                                <th>Nguoi Tao</th>
                                <th>Trang Thai</th>
                                <th>Ngay Duyet</th>
                                <th class="text-end" style="width:180px;">Thao Tac</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="ctdt : ${danhSach}">
                                <td><code th:text="${ctdt.maCTDT}"></code></td>
                                <td class="fw-semibold" th:text="${ctdt.tenCTDT}"></td>
                                <td><span class="badge bg-light text-dark" th:text="${ctdt.khoa ?: '--'}"></span></td>
                                <td class="text-center" th:text="${#lists.size(ctdt.ctdtHocPhans)}"></td>
                                <td class="small text-muted"
                                    th:text="${ctdt.nguoiTao != null ? ctdt.nguoiTao.hoTen : '--'}"></td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${ctdt.trangThai.name() == 'DaDuyet'} ? 'bg-success' :
                                                         (${ctdt.trangThai.name() == 'ChoDuyet'} ? 'bg-warning text-dark' :
                                                         (${ctdt.trangThai.name() == 'BanNhap'} ? 'bg-secondary' : 'bg-danger'))"
                                          th:text="${ctdt.trangThai.name() == 'DaDuyet' ? 'Da Duyet' :
                                                   (ctdt.trangThai.name() == 'ChoDuyet' ? 'Cho Duyet' :
                                                   (ctdt.trangThai.name() == 'BanNhap' ? 'Ban Nhap' : 'Da Huy'))}"></span>
                                </td>
                                <td class="text-muted small" th:text="${ctdt.ngayDuyet != null ?
                                    #temporals.format(ctdt.ngayDuyet, 'dd/MM/yyyy') : '--'}"></td>
                                <td class="text-end">
                                    <a th:href="@{'/ctdt/chi-tiet/' + ${ctdt.maCTDT}}"
                                       class="btn btn-sm btn-outline-secondary"
                                       title="Chi tiet / Quan ly hoc phan"
                                       data-bs-toggle="tooltip">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                    <a sec:authorize="hasAnyRole('PDT','ADMIN')"
                                       th:if="${ctdt.trangThai.name() != 'DaDuyet'}"
                                       th:href="@{'/ctdt/sua/' + ${ctdt.maCTDT}}"
                                       class="btn btn-sm btn-outline-primary"
                                       title="Chinh sua"
                                       data-bs-toggle="tooltip">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <form sec:authorize="hasAnyRole('BGH','TTDTXS','ADMIN')"
                                          th:if="${ctdt.trangThai.name() == 'ChoDuyet'}"
                                          th:action="@{'/ctdt/phe-duyet/' + ${ctdt.maCTDT}}"
                                          method="post" class="d-inline"
                                          onsubmit="return confirm('Phe duyet CTDT nay?')">
                                        <button class="btn btn-sm btn-success"
                                                title="Phe duyet" data-bs-toggle="tooltip">
                                            <i class="bi bi-check2-circle"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(danhSach)}">
                                <td colspan="8" class="text-center text-muted py-5">
                                    <i class="bi bi-inbox display-6 d-block mb-2 opacity-50"></i>
                                    Chua co chuong trinh dao tao nao
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>
</div>

<div th:replace="~{layout/base :: scripts}"></div>
</body>
</html>
