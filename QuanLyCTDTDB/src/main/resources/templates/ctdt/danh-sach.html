<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/base}">
<head><title>Chương Trình Đào Tạo</title></head>
<body>
<div layout:fragment="content">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item">
                <a th:href="@{/dashboard}"><i class="bi bi-house-door me-1"></i>Trang Chủ</a>
            </li>
            <li class="breadcrumb-item active">Chương Trình Đào Tạo</li>
        </ol>
    </nav>

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-2">
        <div>
            <p class="page-subtitle">Đào Tạo</p>
            <h4 class="page-title mb-0">Quản Lý Chương Trình Đào Tạo</h4>
        </div>
        <a sec:authorize="hasAnyRole('PDT','ADMIN')"
           th:href="@{/ctdt/them}" class="btn btn-primary btn-sm">
            <i class="bi bi-plus-lg me-1"></i>Tạo CTĐT Mới
        </a>
    </div>

    <!-- BẢNG DS -->
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span class="fw-semibold"><i class="bi bi-journal-bookmark me-2"></i>Danh Sách Chương Trình Đào Tạo</span>
            <span class="badge bg-secondary" th:text="'Tổng: ' + ${#lists.size(danhSach)}">0</span>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-bordered align-middle mb-0">
                    <thead>
                        <tr>
                            <th style="width:110px;">Mã</th>
                            <th>Tên Chương Trình</th>
                            <th>Khóa</th>
                            <th class="text-center">Số HP</th>
                            <th>Người Tạo</th>
                            <th>Trạng Thái</th>
                            <th>Ngày Duyệt</th>
                            <th class="text-end" style="width:180px;">Thao Tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="ctdt : ${danhSach}">
                            <td><code th:text="${ctdt.maCTDT}"></code></td>
                            <td class="fw-semibold" th:text="${ctdt.tenCTDT}"></td>
                            <td><span class="badge bg-light text-dark" th:text="${ctdt.khoa ?: '--'}"></span></td>
                            <td class="text-center" th:text="${#lists.size(ctdt.ctdtHocPhans)}"></td>
                            <td class="small text-muted"
                                th:text="${ctdt.nguoiTao != null ? ctdt.nguoiTao.hoTen : '--'}"></td>
                            <td>
                                <span class="status-pill"
                                      th:with="s=${ctdt.trangThai.name()}"
                                      th:classappend="${s == 'DaDuyet'  ? 'tone-success'  :
                                                       (s == 'ChoDuyet' ? 'tone-warning'  :
                                                       (s == 'BanNhap'  ? 'tone-neutral' : 'tone-danger'))}">
                                    <span class="pill-dot" aria-hidden="true"></span>
                                    <span th:text="${s == 'DaDuyet'  ? 'Đã Duyệt' :
                                                   (s == 'ChoDuyet' ? 'Chờ Duyệt' :
                                                   (s == 'BanNhap'  ? 'Bản Nháp' : 'Đã Hủy'))}">--</span>
                                </span>
                            </td>
                            <td class="text-muted small" th:text="${ctdt.ngayDuyet != null ?
                                #temporals.format(ctdt.ngayDuyet, 'dd/MM/yyyy') : '--'}"></td>
                            <td class="text-end">
                                <a th:href="@{'/ctdt/chi-tiet/' + ${ctdt.maCTDT}}"
                                   class="btn btn-sm btn-outline-secondary"
                                   data-bs-toggle="tooltip" data-bs-title="Chi tiết / Quản lý học phần">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <a sec:authorize="hasAnyRole('PDT','ADMIN')"
                                   th:if="${ctdt.trangThai.name() != 'DaDuyet'}"
                                   th:href="@{'/ctdt/sua/' + ${ctdt.maCTDT}}"
                                   class="btn btn-sm btn-outline-primary"
                                   data-bs-toggle="tooltip" data-bs-title="Chỉnh sửa">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form sec:authorize="hasAnyRole('BGH','TTDTXS','ADMIN')"
                                      th:if="${ctdt.trangThai.name() == 'ChoDuyet'}"
                                      th:action="@{'/ctdt/phe-duyet/' + ${ctdt.maCTDT}}"
                                      method="post" class="d-inline"
                                      onsubmit="return confirm('Phê duyệt CTĐT này?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}"
                                                          th:value="${_csrf.token}">
                                    <button class="btn btn-sm btn-success"
                                            data-bs-toggle="tooltip" data-bs-title="Phê duyệt">
                                        <i class="bi bi-check2-circle"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(danhSach)}">
                            <td colspan="8">
                                <div class="empty-state">
                                    <i class="bi bi-journal-bookmark"></i>
                                    <p>Chưa có chương trình đào tạo nào.</p>
                                    <a sec:authorize="hasAnyRole('PDT','ADMIN')"
                                       th:href="@{/ctdt/them}"
                                       class="btn btn-primary btn-sm">
                                        <i class="bi bi-plus-lg me-1"></i>Tạo CTĐT Đầu Tiên
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>
</body>
</html>
