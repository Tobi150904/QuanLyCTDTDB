<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/base}">
<head><title>Chi Tiết CTĐT</title></head>
<body>
<div layout:fragment="content">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item">
                <a th:href="@{/dashboard}"><i class="bi bi-house-door me-1"></i>Trang Chủ</a>
            </li>
            <li class="breadcrumb-item">
                <a th:href="@{/ctdt}">Chương Trình Đào Tạo</a>
            </li>
            <li class="breadcrumb-item active" th:text="${ctdt.maCTDT}">CTDT</li>
        </ol>
    </nav>

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-2">
        <div>
            <p class="page-subtitle">Đào Tạo / Chi Tiết</p>
            <h4 class="page-title mb-1" th:text="${ctdt.tenCTDT}">Tên CTĐT</h4>
            <div class="text-muted small">
                Mã: <code th:text="${ctdt.maCTDT}"></code>
                &bull; Khóa: <span th:text="${ctdt.khoa}"></span>
                &bull; Trạng thái:
                <span class="badge"
                      th:classappend="${ctdt.trangThai.name() == 'DaDuyet'} ? 'bg-success' :
                                     (${ctdt.trangThai.name() == 'ChoDuyet'} ? 'bg-warning text-dark' :
                                     (${ctdt.trangThai.name() == 'BanNhap'} ? 'bg-secondary' : 'bg-danger'))"
                      th:text="${ctdt.trangThai.name() == 'DaDuyet' ? 'Đã Duyệt' :
                               (ctdt.trangThai.name() == 'ChoDuyet' ? 'Chờ Duyệt' :
                               (ctdt.trangThai.name() == 'BanNhap' ? 'Bản Nháp' : 'Đã Hủy'))}"></span>
            </div>
        </div>
        <a th:href="@{/ctdt}" class="btn btn-light btn-sm">
            <i class="bi bi-arrow-left me-1"></i>Quay lại
        </a>
    </div>

    <div class="row g-4">
        <!-- DS HỌC PHẦN TRONG CTĐT -->
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-bottom d-flex justify-content-between align-items-center">
                    <h6 class="mb-0 fw-semibold">
                        <i class="bi bi-list-check me-2"></i>Danh Sách Học Phần
                        <span class="badge bg-light text-dark ms-1"
                              th:text="${#lists.size(ctdt.ctdtHocPhans)}">0</span>
                    </h6>
                </div>
                <div class="table-responsive">
                    <table class="table align-middle mb-0">
                        <thead>
                            <tr>
                                <th style="width:100px;">Mã HP</th>
                                <th>Tên HP</th>
                                <th class="text-center">TC</th>
                                <th class="text-center">Học Kỳ</th>
                                <th class="text-center">Số Lớp DK</th>
                                <th>Loại</th>
                                <th class="text-end" style="width:80px;"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${ctdt.ctdtHocPhans}">
                                <td><code th:text="${item.hocPhan.maHocPhan}"></code></td>
                                <td th:text="${item.hocPhan.tenHocPhan}"></td>
                                <td class="text-center" th:text="${item.hocPhan.soTinChi}"></td>
                                <td class="text-center">
                                    <span class="badge bg-light text-dark"
                                          th:text="'HK ' + ${item.hocKyThu}"></span>
                                </td>
                                <td class="text-center" th:text="${item.soLopDuKien}"></td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${item.batBuoc} ? 'bg-primary' : 'bg-info text-dark'"
                                          th:text="${item.batBuoc} ? 'Bắt Buộc' : 'Tự Chọn'"></span>
                                </td>
                                <td class="text-end">
                                    <form sec:authorize="hasAnyRole('PDT','ADMIN')"
                                          th:if="${ctdt.trangThai.name() != 'DaDuyet'}"
                                          th:action="@{'/ctdt/chi-tiet/' + ${ctdt.maCTDT} + '/xoa-hp/' + ${item.hocPhan.maHocPhan}}"
                                          method="post"
                                          onsubmit="return confirm('Xoá học phần này khỏi CTĐT?')">
                                        <input type="hidden" th:name="${_csrf.parameterName}"
                                                              th:value="${_csrf.token}">
                                        <button class="btn btn-sm btn-outline-danger"
                                                data-bs-toggle="tooltip" data-bs-title="Xoá">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(ctdt.ctdtHocPhans)}">
                                <td colspan="7" class="text-center text-muted py-4">
                                    Chưa có học phần trong CTĐT này.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- FORM THÊM HỌC PHẦN -->
        <div class="col-lg-4" sec:authorize="hasAnyRole('PDT','ADMIN')"
             th:if="${ctdt.trangThai.name() != 'DaDuyet'}">
            <div class="card border-0 shadow-sm sticky-top" style="top: 1rem;">
                <div class="card-header bg-white border-bottom">
                    <h6 class="mb-0 fw-semibold">
                        <i class="bi bi-plus-circle me-2"></i>Thêm Học Phần
                    </h6>
                </div>
                <div class="card-body">
                    <form th:action="@{'/ctdt/chi-tiet/' + ${ctdt.maCTDT} + '/them-hp'}"
                          method="post" th:object="${ctdtHocPhanDTO}">
                        <input type="hidden" th:name="${_csrf.parameterName}"
                                              th:value="${_csrf.token}">

                        <div class="mb-3">
                            <label class="form-label fw-medium small">
                                Học Phần <span class="text-danger">*</span>
                            </label>
                            <select class="form-select" th:field="*{maHocPhan}" required>
                                <option value="">-- Chọn --</option>
                                <option th:each="hp : ${hocPhanChuaThuoc}"
                                        th:value="${hp.maHocPhan}"
                                        th:text="${hp.maHocPhan + ' - ' + hp.tenHocPhan + ' (' + hp.soTinChi + 'TC)'}">
                                </option>
                            </select>
                            <div th:if="${#lists.isEmpty(hocPhanChuaThuoc)}"
                                 class="form-text text-warning">
                                Không còn học phần để thêm.
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-medium small">
                                Học Kỳ Thứ <span class="text-danger">*</span>
                            </label>
                            <select class="form-select" th:field="*{hocKyThu}" required>
                                <option value="">-- Chọn --</option>
                                <option th:each="i : ${#numbers.sequence(1,10)}"
                                        th:value="${i}" th:text="'Học kỳ ' + ${i}"></option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-medium small">
                                Số Lớp Dự Kiến <span class="text-danger">*</span>
                            </label>
                            <input type="number" class="form-control"
                                   th:field="*{soLopDuKien}" min="1" required>
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input"
                                   id="batBuoc" th:field="*{batBuoc}">
                            <label class="form-check-label" for="batBuoc">
                                Bắt buộc (bỏ check = Tự chọn)
                            </label>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-medium small">Ghi Chú</label>
                            <input type="text" class="form-control"
                                   th:field="*{ghiChu}" maxlength="255">
                        </div>

                        <button type="submit" class="btn btn-primary w-100"
                                th:disabled="${#lists.isEmpty(hocPhanChuaThuoc)}">
                            <i class="bi bi-plus-lg me-1"></i>Thêm Vào CTĐT
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
