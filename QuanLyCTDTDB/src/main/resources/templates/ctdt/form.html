<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="${isEdit} ? 'Chỉnh Sửa CTĐT' : 'Tạo CTĐT Mới'">Chương Trình Đào Tạo</title>
</head>
<body>
<div layout:fragment="content">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item">
                <a th:href="@{/dashboard}"><i class="bi bi-house-door me-1"></i>Trang Chủ</a>
            </li>
            <li class="breadcrumb-item">
                <a th:href="@{/ctdt}">Chương Trình Đào Tạo</a>
            </li>
            <li class="breadcrumb-item active"
                th:text="${isEdit} ? 'Chỉnh sửa' : 'Tạo mới'">Tạo mới</li>
        </ol>
    </nav>

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-start mb-4">
        <div>
            <p class="page-subtitle">Đào Tạo</p>
            <h4 class="page-title mb-0"
                th:text="${isEdit} ? 'Chỉnh Sửa CTĐT' : 'Tạo CTĐT Mới'">Tạo CTĐT Mới</h4>
        </div>
        <a th:href="@{/ctdt}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i>Quay Lại
        </a>
    </div>

    <!-- FORM -->
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-bottom">
                    <h6 class="mb-0 fw-semibold">
                        <i class="bi bi-journal-text me-2"></i>Thông Tin Chương Trình Đào Tạo
                    </h6>
                </div>
                <div class="card-body p-4">
                    <!-- Banner loi tu service (exception / business rule). Dat
                         truoc form de user nhin thay ngay va KHONG mat input. -->
                    <div th:if="${errorMsg}"
                         class="alert alert-danger d-flex align-items-start" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2 mt-1"></i>
                        <div>
                            <strong class="d-block">Khong the luu CTDT</strong>
                            <span th:text="${errorMsg}"></span>
                        </div>
                    </div>

                    <form th:action="${isEdit} ? @{'/ctdt/sua/' + ${ctdtDTO.maCTDT}} : @{/ctdt/them}"
                          method="post" enctype="multipart/form-data" th:object="${ctdtDTO}"
                          class="needs-validation" novalidate>

                        <!-- Loi validation (binding) - phai nam BEN TRONG form vi
                             #fields.* can binding context cua th:object. -->
                        <div th:if="${#fields.hasErrors('*')}"
                             class="alert alert-warning d-flex align-items-start" role="alert">
                            <i class="bi bi-info-circle-fill me-2 mt-1"></i>
                            <div>
                                <strong class="d-block">Vui long kiem tra lai:</strong>
                                <ul class="mb-0">
                                    <li th:each="err : ${#fields.allErrors()}" th:text="${err}"></li>
                                </ul>
                            </div>
                        </div>

                        <div class="row g-3">
                            <!-- Mã CTĐT -->
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="maCTDT"
                                           th:field="*{maCTDT}"
                                           th:readonly="${isEdit}"
                                           placeholder="CTDT001" maxlength="20" required>
                                    <label for="maCTDT">Mã CTĐT <span class="text-danger">*</span></label>
                                    <div class="invalid-feedback"
                                         th:if="${#fields.hasErrors('maCTDT')}"
                                         th:errors="*{maCTDT}"></div>
                                </div>
                            </div>

                            <!-- Khóa -->
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="khoa"
                                           th:field="*{khoa}" placeholder="K65"
                                           maxlength="10" required>
                                    <label for="khoa">Khóa <span class="text-danger">*</span></label>
                                    <div class="invalid-feedback"
                                         th:if="${#fields.hasErrors('khoa')}"
                                         th:errors="*{khoa}"></div>
                                </div>
                            </div>

                            <!-- Tên CTĐT -->
                            <div class="col-12">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="tenCTDT"
                                           th:field="*{tenCTDT}"
                                           placeholder="Tên chương trình" maxlength="200" required>
                                    <label for="tenCTDT">Tên Chương Trình Đào Tạo <span class="text-danger">*</span></label>
                                    <div class="invalid-feedback"
                                         th:if="${#fields.hasErrors('tenCTDT')}"
                                         th:errors="*{tenCTDT}"></div>
                                </div>
                            </div>

                            <!-- File Word (chỉ khi tạo mới) -->
                            <div class="col-12" th:unless="${isEdit}">
                                <label for="fileWord" class="form-label fw-medium">
                                    File Word CTĐT (tuỳ chọn)
                                </label>
                                <input type="file" class="form-control" id="fileWord"
                                       name="fileWord" accept=".doc,.docx,.pdf">
                                <div class="form-text">
                                    Hỗ trợ file .doc, .docx, .pdf. Tối đa 10MB.
                                </div>
                            </div>
                        </div>

                        <hr class="my-4">
                        <div class="d-flex justify-content-end gap-2">
                            <a th:href="@{/ctdt}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-lg me-1"></i>Huỷ
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check2-circle me-1"></i>
                                <span th:text="${isEdit} ? 'Lưu Thay Đổi' : 'Tạo Mới'">Tạo Mới</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
