<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<head>
  <title th:text="${isEdit} ? 'Sua Nguoi Dung' : 'Them Nguoi Dung'">Nguoi Dung</title>
</head>

<body>
<div layout:fragment="content">

  <!-- Breadcrumb -->
  <nav aria-label="breadcrumb">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a th:href="@{/dashboard}">Trang chu</a></li>
      <li class="breadcrumb-item"><a th:href="@{/nguoi-dung}">Quan ly Nguoi Dung</a></li>
      <li class="breadcrumb-item active"
          th:text="${isEdit} ? 'Chinh sua' : 'Them moi'">Them moi</li>
    </ol>
  </nav>

  <!-- Error flash (business exception) -->
  <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show alert-flash" role="alert">
    <i class="bi bi-exclamation-triangle-fill me-2"></i>
    <span th:text="${errorMsg}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <!-- Page Header -->
  <div class="page-header">
    <div>
      <div class="page-header-label">Quan ly Nguoi Dung</div>
      <h4 class="page-header-title"
          th:text="${isEdit} ? 'Chinh sua nguoi dung' : 'Them nguoi dung moi'">Form</h4>
    </div>
    <a th:href="@{/nguoi-dung}" class="btn btn-outline-secondary btn-sm">
      <i class="bi bi-arrow-left me-1"></i> Quay lai
    </a>
  </div>

  <!-- Form Card -->
  <div class="card" style="max-width: 820px;">
    <div class="card-header">
      <i class="bi bi-person-fill me-2"></i>
      <span th:text="${isEdit} ? 'Thong tin nguoi dung' : 'Nhap thong tin nguoi dung moi'"></span>
    </div>
    <div class="card-body">

      <form th:action="${isEdit} ? @{/nguoi-dung/{id}/sua(id=${nguoiDungDTO.maNguoiDung})} : @{/nguoi-dung/them}"
            th:object="${nguoiDungDTO}"
            method="post"
            onsubmit="showLoading(this)">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <!-- Section: Thong tin co ban -->
        <h6 class="section-title mb-3">Thong tin co ban</h6>
        <div class="row g-3 mb-4">

          <!-- Ma nguoi dung -->
          <div class="col-md-4">
            <div class="form-floating">
              <input type="text" class="form-control"
                     th:class="${#fields.hasErrors('maNguoiDung')} ? 'form-control is-invalid' : 'form-control'"
                     id="maNguoiDung" placeholder="Ma ND"
                     th:field="*{maNguoiDung}"
                     th:readonly="${isEdit}">
              <label for="maNguoiDung">Ma nguoi dung <span class="text-danger">*</span></label>
              <div class="invalid-feedback" th:errors="*{maNguoiDung}"></div>
            </div>
          </div>

          <!-- Ho ten -->
          <div class="col-md-8">
            <div class="form-floating">
              <input type="text" class="form-control"
                     th:class="${#fields.hasErrors('hoTen')} ? 'form-control is-invalid' : 'form-control'"
                     id="hoTen" placeholder="Ho va ten"
                     th:field="*{hoTen}">
              <label for="hoTen">Ho va ten <span class="text-danger">*</span></label>
              <div class="invalid-feedback" th:errors="*{hoTen}"></div>
            </div>
          </div>

          <!-- Email -->
          <div class="col-md-6">
            <div class="form-floating">
              <input type="email" class="form-control"
                     th:class="${#fields.hasErrors('email')} ? 'form-control is-invalid' : 'form-control'"
                     id="email" placeholder="Email"
                     th:field="*{email}">
              <label for="email">Email <span class="text-danger">*</span></label>
              <div class="invalid-feedback" th:errors="*{email}"></div>
            </div>
          </div>

          <!-- So dien thoai -->
          <div class="col-md-6">
            <div class="form-floating">
              <input type="text" class="form-control" id="soDienThoai"
                     placeholder="So dien thoai" th:field="*{soDienThoai}">
              <label for="soDienThoai">So dien thoai</label>
            </div>
          </div>
        </div>

        <!-- Section: Dang nhap -->
        <h6 class="section-title mb-3">Thong tin dang nhap</h6>
        <div class="row g-3 mb-4">

          <!-- Ten dang nhap -->
          <div class="col-md-6">
            <div class="form-floating">
              <input type="text" class="form-control"
                     th:class="${#fields.hasErrors('tenDangNhap')} ? 'form-control is-invalid' : 'form-control'"
                     id="tenDangNhap" placeholder="Ten dang nhap"
                     th:field="*{tenDangNhap}">
              <label for="tenDangNhap">Ten dang nhap <span class="text-danger">*</span></label>
              <div class="invalid-feedback" th:errors="*{tenDangNhap}"></div>
            </div>
          </div>

          <!-- Mat khau (chi hien khi them moi) -->
          <div class="col-md-6" th:if="${!isEdit}">
            <div class="form-floating">
              <input type="password" class="form-control"
                     th:class="${#fields.hasErrors('matKhau')} ? 'form-control is-invalid' : 'form-control'"
                     id="matKhau" placeholder="Mat khau"
                     th:field="*{matKhau}">
              <label for="matKhau">Mat khau <small class="text-muted">(de trong = dung Ma ND)</small></label>
              <div class="invalid-feedback" th:errors="*{matKhau}"></div>
            </div>
          </div>

          <!-- Trang thai TK (khi sua) -->
          <div class="col-md-6" th:if="${isEdit}">
            <div class="form-floating">
              <select class="form-select" id="trangThaiTK" th:field="*{trangThaiTK}">
                <option value="true">Hoat dong</option>
                <option value="false">Bi khoa</option>
              </select>
              <label for="trangThaiTK">Trang thai tai khoan</label>
            </div>
          </div>
        </div>

        <!-- Section: Phan quyen -->
        <h6 class="section-title mb-3">Vai tro</h6>
        <div class="mb-4">
          <div th:if="${#fields.hasErrors('vaiTros')}" class="text-danger small mb-2"
               th:errors="*{vaiTros}"></div>
          <div class="row g-2">
            <div class="col-6 col-md-3"
                 th:each="vt : ${danhSachVaiTro}">
              <div class="form-check form-check-card">
                <input class="form-check-input" type="checkbox"
                       th:id="'vt-' + ${vt.name()}"
                       name="vaiTros"
                       th:value="${vt.name()}"
                       th:checked="${nguoiDungDTO.vaiTros != null and nguoiDungDTO.vaiTros.contains(vt)}">
                <label class="form-check-label" th:for="'vt-' + ${vt.name()}"
                       th:text="${vt.moTa}"></label>
              </div>
            </div>
          </div>
        </div>

        <!-- Section: Sinh vien (hien khi chon role SV) -->
        <div id="sectionSV" class="mb-4" style="display:none;">
          <h6 class="section-title mb-3">Thong tin Sinh Vien</h6>
          <div class="row g-3">
            <div class="col-md-6">
              <div class="form-floating">
                <select class="form-select" id="maLopHC" th:field="*{maLopHC}">
                  <option value="">-- Chon lop hanh chinh --</option>
                  <option th:each="lhc : ${danhSachLopHC}"
                          th:value="${lhc.maLopHC}"
                          th:text="${lhc.maLopHC + ' - ' + lhc.tenLop}">
                  </option>
                </select>
                <label for="maLopHC">Lop hanh chinh</label>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-floating">
                <select class="form-select" id="trangThaiSV" th:field="*{trangThaiSV}">
                  <option value="">-- Trang thai SV --</option>
                  <option value="DangHoc">Dang hoc</option>
                  <option value="BaoLuu">Bao luu</option>
                  <option value="ThoiHoc">Thoi hoc</option>
                  <option value="TotNghiep">Tot nghiep</option>
                </select>
                <label for="trangThaiSV">Trang thai sinh vien</label>
              </div>
            </div>
          </div>
        </div>

        <!-- Submit -->
        <div class="d-flex gap-2 pt-2 border-top">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-save me-1"></i>
            <span th:text="${isEdit} ? 'Luu thay doi' : 'Them nguoi dung'">Luu</span>
          </button>
          <a th:href="@{/nguoi-dung}" class="btn btn-outline-secondary">
            <i class="bi bi-x-circle me-1"></i> Huy
          </a>
        </div>

      </form>
    </div>
  </div>

</div><!-- end content -->

<th:block layout:fragment="scripts">
<script>
// Hien/an section SV khi check role SV
function updateSectionSV() {
  const svChecked = document.querySelector('input[value="SV"]')?.checked;
  const section = document.getElementById('sectionSV');
  if (section) section.style.display = svChecked ? 'block' : 'none';
}

document.querySelectorAll('input[name="vaiTros"]').forEach(cb => {
  cb.addEventListener('change', updateSectionSV);
});

// Chay khi page load (khi edit - da check san)
updateSectionSV();
</script>
</th:block>

</body>
</html>
