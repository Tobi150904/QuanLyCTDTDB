<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Quan Ly Lop Hanh Chinh</title></head>
<body>
<div layout:fragment="content">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item">
                <a th:href="@{/dashboard}"><i class="bi bi-house-door me-1"></i>Trang Chu</a>
            </li>
            <li class="breadcrumb-item active">Lop Hanh Chinh</li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-start mb-4">
        <div>
            <p class="page-subtitle">Hoc Vu</p>
            <h4 class="page-title">Quan Ly Lop Hanh Chinh</h4>
        </div>
        <a th:href="@{/lop-hanh-chinh/them}" class="btn btn-primary btn-sm">
            <i class="bi bi-plus-lg me-1"></i>Them Lop
        </a>
    </div>

    <!-- Stats -->
    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
            <div class="stat-card">
                <div class="stat-card-icon"><i class="bi bi-collection"></i></div>
                <div>
                    <div class="stat-card-value" th:text="${thongKe['tong'] ?: 0}">0</div>
                    <div class="stat-card-label">Tong Lop</div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="stat-card">
                <div class="stat-card-icon" style="background:#198754;"><i class="bi bi-person-check"></i></div>
                <div>
                    <div class="stat-card-value" th:text="${thongKe['daCoCVHT'] ?: 0}">0</div>
                    <div class="stat-card-label">Da Co CVHT</div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="stat-card">
                <div class="stat-card-icon" style="background:#dc3545;"><i class="bi bi-person-x"></i></div>
                <div>
                    <div class="stat-card-value" th:text="${thongKe['chuaCoCVHT'] ?: 0}">0</div>
                    <div class="stat-card-label">Chua Co CVHT</div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="stat-card">
                <div class="stat-card-icon" style="background:#0dcaf0;"><i class="bi bi-mortarboard"></i></div>
                <div>
                    <div class="stat-card-value" th:text="${thongKe['soKhoaHoc'] ?: 0}">0</div>
                    <div class="stat-card-label">So Khoa</div>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${successMsg}"></span>
        <button class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${errorMsg}"></span>
        <button class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Filter -->
    <div class="card mb-4">
        <div class="card-body py-3">
            <form th:action="@{/lop-hanh-chinh}" method="get" class="row g-2 align-items-end">
                <div class="col-md-5">
                    <div class="input-group search-bar">
                        <span class="input-group-text"><i class="bi bi-search"></i></span>
                        <input type="text" name="keyword" th:value="${keyword}"
                               class="form-control" placeholder="Tim ma lop, ten lop...">
                    </div>
                </div>
                <div class="col-md-3">
                    <select class="form-select form-select-sm" name="maCTDT">
                        <option value="">-- Tat Ca CTDT --</option>
                        <option th:each="c : ${ctdtList}"
                                th:value="${c.maCTDT}"
                                th:text="${c.maCTDT + ' - ' + c.tenCTDT}"
                                th:selected="${maCTDT != null and maCTDT == c.maCTDT}"></option>
                    </select>
                </div>
                <div class="col-md-2">
                    <input type="text" name="khoaHoc" th:value="${khoaHoc}"
                           class="form-control form-control-sm" placeholder="Khoa (62, 63...)">
                </div>
                <div class="col-auto">
                    <button class="btn btn-primary btn-sm">
                        <i class="bi bi-funnel me-1"></i>Loc
                    </button>
                    <a th:href="@{/lop-hanh-chinh}" class="btn btn-outline-secondary btn-sm ms-1">
                        <i class="bi bi-x-lg"></i>
                    </a>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span class="fw-semibold"><i class="bi bi-table me-2"></i>Danh Sach Lop</span>
            <span class="badge bg-secondary" th:text="'Tong: ' + ${#lists.size(lopList)}">0</span>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-bordered align-middle mb-0">
                    <thead>
                        <tr>
                            <th style="width:50px;">STT</th>
                            <th>Ma Lop</th>
                            <th>Ten Lop</th>
                            <th>Khoa</th>
                            <th>CTDT</th>
                            <th>Co Van HT</th>
                            <th class="text-center" style="width:140px;">Thao Tac</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(lopList)}">
                            <td colspan="7" class="text-center py-5">
                                <i class="bi bi-inbox display-4 text-muted d-block mb-3"></i>
                                <p class="text-muted mb-3">Khong co lop nao phu hop bo loc.</p>
                            </td>
                        </tr>
                        <tr th:each="lop, stat : ${lopList}">
                            <td class="text-muted" th:text="${stat.index + 1}">1</td>
                            <td><code th:text="${lop.maLopHC}"></code></td>
                            <td>
                                <a th:href="@{/lop-hanh-chinh/chi-tiet/{ma}(ma=${lop.maLopHC})}"
                                   class="text-decoration-none fw-medium"
                                   th:text="${lop.tenLop}"></a>
                            </td>
                            <td><span class="badge bg-info text-dark" th:text="'K' + ${lop.khoaHoc}"></span></td>
                            <td class="small text-muted"
                                th:text="${lop.chuongTrinhDaoTao != null ? lop.chuongTrinhDaoTao.maCTDT : '--'}">--</td>
                            <td class="small">
                                <span th:if="${lop.coVan != null}"
                                      th:text="${lop.coVan.nguoiDung != null ? lop.coVan.nguoiDung.hoTen : lop.coVan.maGV}">--</span>
                                <span th:unless="${lop.coVan != null}" class="text-muted fst-italic">Chua phan cong</span>
                            </td>
                            <td class="text-center">
                                <div class="d-flex gap-1 justify-content-center">
                                    <a th:href="@{/lop-hanh-chinh/chi-tiet/{ma}(ma=${lop.maLopHC})}"
                                       class="btn btn-sm btn-outline-secondary"
                                       data-bs-toggle="tooltip" data-bs-title="Chi Tiet">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                    <a th:href="@{/lop-hanh-chinh/sua/{ma}(ma=${lop.maLopHC})}"
                                       class="btn btn-sm btn-outline-primary"
                                       data-bs-toggle="tooltip" data-bs-title="Sua">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <form th:action="@{/lop-hanh-chinh/xoa/{ma}(ma=${lop.maLopHC})}"
                                          method="post" class="d-inline"
                                          onsubmit="return confirm('Xoa lop [[${lop.maLopHC}]]?')">
                                        <input type="hidden" th:name="${_csrf.parameterName}"
                                                              th:value="${_csrf.token}">
                                        <button class="btn btn-sm btn-outline-danger"
                                                data-bs-toggle="tooltip" data-bs-title="Xoa">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>
</body>
</html>
