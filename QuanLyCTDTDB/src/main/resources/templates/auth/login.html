<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dang Nhap — He Thong QLDTXS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --primary:    #1e3a5f;
            --primary-lt: #2d5f9e;
            --accent:     #e8a020;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background-color: #f4f6f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .login-wrapper {
            width: 100%;
            max-width: 420px;
        }
        .login-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
            overflow: hidden;
        }
        .login-header {
            background: var(--primary);
            color: #fff;
            padding: 32px 36px 24px;
            text-align: center;
        }
        .login-header .logo-icon {
            font-size: 2.8rem;
            margin-bottom: 8px;
            display: block;
        }
        .login-header h1 {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 0 0 4px;
            letter-spacing: 0.3px;
        }
        .login-header p {
            font-size: 0.78rem;
            opacity: 0.8;
            margin: 0;
        }
        .login-body {
            padding: 32px 36px 28px;
        }
        .form-label {
            font-weight: 500;
            font-size: 0.875rem;
            margin-bottom: 4px;
        }
        .form-control {
            font-size: 0.9rem;
            padding: 10px 14px;
            border-radius: 8px;
        }
        .form-control:focus {
            border-color: var(--primary-lt);
            box-shadow: 0 0 0 0.2rem rgba(45,95,158,0.15);
        }
        .input-group-text {
            background: #f8f9fa;
            border-radius: 8px 0 0 8px;
            color: #6c757d;
            border-color: #ced4da;
        }
        .input-group .form-control { border-radius: 0 8px 8px 0; }
        .btn-login {
            background-color: var(--primary);
            border-color: var(--primary);
            color: #fff;
            font-weight: 600;
            font-size: 0.95rem;
            padding: 11px;
            border-radius: 8px;
            width: 100%;
            transition: background-color 0.2s;
        }
        .btn-login:hover {
            background-color: var(--primary-lt);
            border-color: var(--primary-lt);
            color: #fff;
        }
        .alert { font-size: 0.875rem; border-radius: 8px; }
        .login-footer {
            text-align: center;
            padding: 14px 36px 20px;
            background: #f8f9fa;
            border-top: 1px solid #dee2e6;
            font-size: 0.78rem;
            color: #6c757d;
        }
        .accent-bar {
            height: 4px;
            background: var(--accent);
        }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">
        <!-- Accent bar top -->
        <div class="accent-bar"></div>

        <!-- Header -->
        <div class="login-header">
            <i class="bi bi-mortarboard-fill logo-icon"></i>
            <h1>He Thong QLDTXS</h1>
            <p>Quan Ly Dao Tao Xuat Sac</p>
        </div>

        <!-- Body -->
        <div class="login-body">

            <!-- Flash Messages -->
            <div th:if="${errorMsg}"
                 class="alert alert-danger d-flex align-items-center mb-3" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2 flex-shrink-0"></i>
                <span th:text="${errorMsg}"></span>
            </div>
            <div th:if="${successMsg}"
                 class="alert alert-success d-flex align-items-center mb-3" role="alert">
                <i class="bi bi-check-circle-fill me-2 flex-shrink-0"></i>
                <span th:text="${successMsg}"></span>
            </div>
            <div th:if="${warningMsg}"
                 class="alert alert-warning d-flex align-items-center mb-3" role="alert">
                <i class="bi bi-exclamation-circle-fill me-2 flex-shrink-0"></i>
                <span th:text="${warningMsg}"></span>
            </div>

            <!-- Login Form -->
            <form th:action="@{/login}" method="post" novalidate>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="mb-3">
                    <label for="username" class="form-label">
                        Ten Dang Nhap / Email
                        <span class="text-danger">*</span>
                    </label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-person"></i>
                        </span>
                        <input type="text"
                               class="form-control"
                               id="username"
                               name="username"
                               placeholder="Nhap ten dang nhap hoac email"
                               autocomplete="username"
                               required
                               autofocus>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">
                        Mat Khau
                        <span class="text-danger">*</span>
                    </label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-lock"></i>
                        </span>
                        <input type="password"
                               class="form-control"
                               id="password"
                               name="password"
                               placeholder="Nhap mat khau"
                               autocomplete="current-password"
                               required>
                        <button class="btn btn-outline-secondary"
                                type="button"
                                id="togglePassword"
                                tabindex="-1">
                            <i class="bi bi-eye" id="togglePasswordIcon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-login">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Dang Nhap
                </button>
            </form>
        </div>

        <!-- Footer -->
        <div class="login-footer">
            <i class="bi bi-shield-lock me-1"></i>
            Truong Dai Hoc Nguyen Tat Thanh &copy; 2024
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Toggle show/hide password
    document.getElementById('togglePassword').addEventListener('click', function () {
        var pw = document.getElementById('password');
        var icon = document.getElementById('togglePasswordIcon');
        if (pw.type === 'password') {
            pw.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            pw.type = 'password';
            icon.className = 'bi bi-eye';
        }
    });
</script>
</body>
</html>
