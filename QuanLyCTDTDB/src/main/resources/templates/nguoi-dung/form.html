<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="${isEdit} ? 'Chỉnh Sửa Người Dùng' : 'Thêm Người Dùng'">Form Người Dùng</title>
</head>
<body>
<div layout:fragment="content">

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item">
                <a th:href="@{/dashboard}" class="text-decoration-none">
                    <i class="bi bi-house-door me-1"></i>Trang Chủ
                </a>
            </li>
            <li class="breadcrumb-item">
                <a th:href="@{/nguoi-dung}" class="text-decoration-none">Người Dùng</a>
            </li>
            <li class="breadcrumb-item active" aria-current="page"
                th:text="${isEdit} ? 'Chỉnh Sửa' : 'Thêm Mới'">Form</li>
        </ol>
    </nav>

    <!-- Page Header -->
    <div class="d-flex justify-content-between align-items-start mb-4">
        <div>
            <p class="page-subtitle">Quản Trị / Người Dùng</p>
            <h4 class="page-title"
                th:text="${isEdit} ? 'Chỉnh Sửa Người Dùng' : 'Thêm Người Dùng Mới'">
                Form Người Dùng
            </h4>
        </div>
        <a th:href="@{/nguoi-dung}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i>Quay Lại
        </a>
    </div>

    <!-- Form Card -->
    <div class="card" style="max-width:780px;">
        <div class="card-header">
            <i class="bi bi-person-fill me-2"></i>
            <span class="fw-semibold"
                  th:text="${isEdit} ? 'Thông Tin Người Dùng' : 'Tạo Tài Khoản Mới'">
                Thông Tin
            </span>
        </div>
        <div class="card-body">

            <form th:action="${isEdit} ? @{/nguoi-dung/sua/{ma}(ma=${nguoiDungDTO.maNguoiDung})} : @{/nguoi-dung/them}"
                  th:object="${nguoiDungDTO}"
                  method="post"
                  novalidate>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" th:field="*{maNguoiDung}">

                <!-- Section: Thong tin co ban -->
                <h6 class="section-label">Thông Tin Cơ Bản</h6>

                <div class="row g-3 mb-3">
                    <!-- Tên đăng nhập -->
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="text"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('tenDangNhap')} ? 'is-invalid'"
                                   id="tenDangNhap"
                                   th:field="*{tenDangNhap}"
                                   placeholder="Tên đăng nhập"
                                   th:readonly="${isEdit}"
                                   required>
                            <label for="tenDangNhap">
                                Tên Đăng Nhập <span class="text-danger">*</span>
                            </label>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('tenDangNhap')}"
                                 th:errors="*{tenDangNhap}"></div>
                        </div>
                    </div>

                    <!-- Loại người dùng
                         Edit mode: hiện text readonly + hidden field để vẫn POST được giá trị.
                         (HTML <select disabled> không submit, gây lỗi @NotNull khi save.) -->
                    <div class="col-md-6">
                        <!-- Khi tạo mới: select thường -->
                        <div class="form-floating" th:unless="${isEdit}">
                            <select class="form-select"
                                    id="loaiNguoiDung"
                                    th:field="*{loaiNguoiDung}"
                                    onchange="toggleExtraFields()"
                                    required>
                                <option value="">-- Chọn Loại --</option>
                                <option th:each="l : ${loaiList}"
                                        th:value="${l.name()}"
                                        th:text="${l.name() == 'Admin'       ? 'Quản Trị Viên' :
                                                  (l.name() == 'GiangVien'  ? 'Giảng Viên'     :
                                                  (l.name() == 'SinhVien'   ? 'Sinh Viên'      :
                                                  (l.name() == 'DoanhNghiep' ? 'Doanh Nghiệp' : l.name())))}">
                                </option>
                            </select>
                            <label for="loaiNguoiDung">
                                Loại Người Dùng <span class="text-danger">*</span>
                            </label>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('loaiNguoiDung')}"
                                 th:errors="*{loaiNguoiDung}"></div>
                        </div>
                        <!-- Khi sửa: input readonly + hidden field -->
                        <div class="form-floating" th:if="${isEdit}">
                            <input type="text"
                                   class="form-control"
                                   id="loaiNguoiDungDisplay"
                                   th:with="v=${nguoiDungDTO.loaiNguoiDung != null ? nguoiDungDTO.loaiNguoiDung.name() : ''}"
                                   th:value="${v == 'Admin'       ? 'Quản Trị Viên' :
                                             (v == 'GiangVien'  ? 'Giảng Viên'     :
                                             (v == 'SinhVien'   ? 'Sinh Viên'      :
                                             (v == 'DoanhNghiep' ? 'Doanh Nghiệp' : v)))}"
                                   readonly>
                            <label for="loaiNguoiDungDisplay">
                                Loại Người Dùng (không thể đổi)
                            </label>
                            <input type="hidden"
                                   th:field="*{loaiNguoiDung}">
                        </div>
                    </div>
                </div>

                <div class="row g-3 mb-3">
                    <!-- Mật khẩu -->
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="password"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('matKhau')} ? 'is-invalid'"
                                   id="matKhau"
                                   th:field="*{matKhau}"
                                   placeholder="Mật khẩu"
                                   th:required="!${isEdit}">
                            <label for="matKhau">
                                Mật Kh���u
                                <span class="text-danger" th:unless="${isEdit}">*</span>
                                <span class="text-muted small" th:if="${isEdit}">(để trống nếu không đổi)</span>
                            </label>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('matKhau')}"
                                 th:errors="*{matKhau}"></div>
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="email"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                   id="email"
                                   th:field="*{email}"
                                   placeholder="Email"
                                   required>
                            <label for="email">Email <span class="text-danger">*</span></label>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('email')}"
                                 th:errors="*{email}"></div>
                        </div>
                    </div>
                </div>

                <div class="row g-3 mb-4">
                    <!-- Họ tên -->
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="text"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('hoTen')} ? 'is-invalid'"
                                   id="hoTen"
                                   th:field="*{hoTen}"
                                   placeholder="Họ tên"
                                   required>
                            <label for="hoTen">Họ Tên <span class="text-danger">*</span></label>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('hoTen')}"
                                 th:errors="*{hoTen}"></div>
                        </div>
                    </div>

                    <!-- Số điện thoại -->
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="tel"
                                   class="form-control"
                                   id="soDienThoai"
                                   th:field="*{soDienThoai}"
                                   placeholder="Số điện thoại"
                                   maxlength="15">
                            <label for="soDienThoai">Số Điện Thoại</label>
                        </div>
                    </div>
                </div>

                <!-- Section: GiangVien fields -->
                <div id="giangVienFields" class="d-none">
                    <h6 class="section-label">Thông Tin Giảng Viên</h6>
                    <div class="row g-3 mb-4">
                        <div class="col-md-4">
                            <div class="form-floating">
                                <input type="text" class="form-control"
                                       id="hocHam" th:field="*{hocHam}"
                                       placeholder="Học hàm">
                                <label for="hocHam">Học Hàm</label>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-floating">
                                <input type="text" class="form-control"
                                       id="hocVi" th:field="*{hocVi}"
                                       placeholder="Học vị">
                                <label for="hocVi">Học Vị</label>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-floating">
                                <input type="text" class="form-control"
                                       id="chuyenNganh" th:field="*{chuyenNganh}"
                                       placeholder="Chuyên ngành">
                                <label for="chuyenNganh">Chuyên Ngành</label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Section: SinhVien fields -->
                <div id="sinhVienFields" class="d-none">
                    <h6 class="section-label">Thông Tin Sinh Viên</h6>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <div class="form-floating">
                                <select class="form-select" id="maLopHC" th:field="*{maLopHC}">
                                    <option value="">-- Chọn Lớp Hành Chính --</option>
                                    <option th:each="lhc : ${lopHCList}"
                                            th:value="${lhc.maLopHC}"
                                            th:text="${lhc.maLopHC} + ' - ' + ${lhc.tenLop}">
                                    </option>
                                </select>
                                <label for="maLopHC">Lớp Hành Chính <span class="text-danger">*</span></label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Section: Vai Tro -->
                <h6 class="section-label">Vai Trò Nghiệp Vụ (Có Thể Chọn Nhiều)</h6>
                <div class="row g-2 mb-4">
                    <div class="col-auto" th:each="vt : ${vaiTroList}">
                        <div class="form-check form-check-inline">
                            <input class="form-check-input"
                                   type="checkbox"
                                   th:id="'vt_' + ${vt.name()}"
                                   name="vaiTros"
                                   th:value="${vt.name()}"
                                   th:checked="${nguoiDungDTO.vaiTros != null and nguoiDungDTO.vaiTros.contains(vt)}">
                            <label class="form-check-label"
                                   th:for="'vt_' + ${vt.name()}"
                                   th:with="v=${vt.name()}"
                                   th:text="${v == 'PDT'    ? 'PDT — Phòng Đào Tạo'              :
                                             (v == 'TTDTXS' ? 'TTDTXS — Trung Tâm Đào Tạo Xuất Sắc' :
                                             (v == 'CVHT'   ? 'CVHT — Cố Vấn Học Tập'              :
                                             (v == 'CNHP'   ? 'CNHP — Chủ Nhiệm Học Phần'          : v)))}"></label>
                        </div>
                    </div>
                </div>

                <!-- Buttons -->
                <div class="d-flex gap-2">
                    <button type="submit"
                            class="btn btn-primary"
                            onclick="showLoading(this)">
                        <span class="spinner-border spinner-border-sm d-none me-1" role="status"></span>
                        <i class="bi bi-save me-1"></i>
                        <span th:text="${isEdit} ? 'Cập Nhật' : 'Tạo Mới'">Lưu</span>
                    </button>
                    <a th:href="@{/nguoi-dung}" class="btn btn-outline-secondary">
                        <i class="bi bi-x-lg me-1"></i>Huỷ
                    </a>
                </div>
            </form>
        </div>
    </div>

</div>

<th:block layout:fragment="scripts">
<script th:inline="javascript">
    var isEdit = /*[[${isEdit}]]*/ false;
    var currentLoai = /*[[${nguoiDungDTO.loaiNguoiDung != null ? nguoiDungDTO.loaiNguoiDung.name() : ''}]]*/ '';

    function toggleExtraFields() {
        var sel = document.getElementById('loaiNguoiDung');
        var loai = sel ? sel.value : currentLoai;
        var gvFields = document.getElementById('giangVienFields');
        var svFields = document.getElementById('sinhVienFields');

        if (gvFields) gvFields.classList.toggle('d-none', loai !== 'GiangVien');
        if (svFields) svFields.classList.toggle('d-none', loai !== 'SinhVien');
    }

    // Khoi tao khi load trang
    document.addEventListener('DOMContentLoaded', function () {
        if (isEdit) {
            toggleExtraFields();
        } else {
            var sel = document.getElementById('loaiNguoiDung');
            if (sel) sel.addEventListener('change', toggleExtraFields);
        }
        // Neu dang edit, hien field tuong ung
        if (currentLoai) toggleExtraFields();
    });
</script>
</th:block>
</body>
</html>
