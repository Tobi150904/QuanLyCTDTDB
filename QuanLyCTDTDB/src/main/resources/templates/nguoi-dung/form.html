<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="${isEdit} ? 'Chinh Sua Nguoi Dung' : 'Them Nguoi Dung'">Form Nguoi Dung</title>
</head>
<body>
<div layout:fragment="content">

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item">
                <a th:href="@{/dashboard}" class="text-decoration-none">
                    <i class="bi bi-house-door me-1"></i>Trang Chu
                </a>
            </li>
            <li class="breadcrumb-item">
                <a th:href="@{/nguoi-dung}" class="text-decoration-none">Nguoi Dung</a>
            </li>
            <li class="breadcrumb-item active" aria-current="page"
                th:text="${isEdit} ? 'Chinh Sua' : 'Them Moi'">Form</li>
        </ol>
    </nav>

    <!-- Page Header -->
    <div class="d-flex justify-content-between align-items-start mb-4">
        <div>
            <p class="page-subtitle">Quan Tri / Nguoi Dung</p>
            <h4 class="page-title"
                th:text="${isEdit} ? 'Chinh Sua Nguoi Dung' : 'Them Nguoi Dung Moi'">
                Form Nguoi Dung
            </h4>
        </div>
        <a th:href="@{/nguoi-dung}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i>Quay Lai
        </a>
    </div>

    <!-- Form Card -->
    <div class="card" style="max-width:780px;">
        <div class="card-header">
            <i class="bi bi-person-fill me-2"></i>
            <span class="fw-semibold"
                  th:text="${isEdit} ? 'Thong Tin Nguoi Dung' : 'Tao Tai Khoan Moi'">
                Thong Tin
            </span>
        </div>
        <div class="card-body">

            <form th:action="${isEdit} ? @{/nguoi-dung/sua/{ma}(ma=${nguoiDungDTO.maNguoiDung})} : @{/nguoi-dung/them}"
                  th:object="${nguoiDungDTO}"
                  method="post"
                  novalidate>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" th:field="*{maNguoiDung}">

                <!-- Section: Thong tin co ban -->
                <h6 class="text-uppercase text-muted mb-3"
                    style="font-size:0.75rem; letter-spacing:0.5px;">
                    Thong Tin Co Ban
                </h6>

                <div class="row g-3 mb-3">
                    <!-- Ten Dang Nhap -->
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="text"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('tenDangNhap')} ? 'is-invalid'"
                                   id="tenDangNhap"
                                   th:field="*{tenDangNhap}"
                                   placeholder="Ten Dang Nhap"
                                   th:readonly="${isEdit}"
                                   required>
                            <label for="tenDangNhap">
                                Ten Dang Nhap <span class="text-danger">*</span>
                            </label>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('tenDangNhap')}"
                                 th:errors="*{tenDangNhap}"></div>
                        </div>
                    </div>

                    <!-- Loai Nguoi Dung -->
                    <div class="col-md-6">
                        <div class="form-floating">
                            <select class="form-select"
                                    id="loaiNguoiDung"
                                    th:field="*{loaiNguoiDung}"
                                    th:disabled="${isEdit}"
                                    onchange="toggleExtraFields()"
                                    required>
                                <option value="">-- Chon Loai --</option>
                                <option th:each="l : ${loaiList}"
                                        th:value="${l.name()}"
                                        th:text="${l.name()}">
                                </option>
                            </select>
                            <label for="loaiNguoiDung">
                                Loai Nguoi Dung <span class="text-danger">*</span>
                            </label>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('loaiNguoiDung')}"
                                 th:errors="*{loaiNguoiDung}"></div>
                        </div>
                    </div>
                </div>

                <div class="row g-3 mb-3">
                    <!-- Mat Khau -->
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="password"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('matKhau')} ? 'is-invalid'"
                                   id="matKhau"
                                   th:field="*{matKhau}"
                                   placeholder="Mat Khau"
                                   th:required="!${isEdit}">
                            <label for="matKhau">
                                Mat Khau
                                <span class="text-danger" th:unless="${isEdit}">*</span>
                                <span class="text-muted small" th:if="${isEdit}">(de trong neu khong doi)</span>
                            </label>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('matKhau')}"
                                 th:errors="*{matKhau}"></div>
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="email"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                   id="email"
                                   th:field="*{email}"
                                   placeholder="Email"
                                   required>
                            <label for="email">Email <span class="text-danger">*</span></label>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('email')}"
                                 th:errors="*{email}"></div>
                        </div>
                    </div>
                </div>

                <div class="row g-3 mb-4">
                    <!-- Ho Ten -->
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="text"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('hoTen')} ? 'is-invalid'"
                                   id="hoTen"
                                   th:field="*{hoTen}"
                                   placeholder="Ho Ten"
                                   required>
                            <label for="hoTen">Ho Ten <span class="text-danger">*</span></label>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('hoTen')}"
                                 th:errors="*{hoTen}"></div>
                        </div>
                    </div>

                    <!-- So Dien Thoai -->
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="tel"
                                   class="form-control"
                                   id="soDienThoai"
                                   th:field="*{soDienThoai}"
                                   placeholder="So Dien Thoai"
                                   maxlength="15">
                            <label for="soDienThoai">So Dien Thoai</label>
                        </div>
                    </div>
                </div>

                <!-- Section: GiangVien fields -->
                <div id="giangVienFields" class="d-none">
                    <h6 class="text-uppercase text-muted mb-3"
                        style="font-size:0.75rem; letter-spacing:0.5px;">
                        Thong Tin Giang Vien
                    </h6>
                    <div class="row g-3 mb-4">
                        <div class="col-md-4">
                            <div class="form-floating">
                                <input type="text" class="form-control"
                                       id="hocHam" th:field="*{hocHam}"
                                       placeholder="Hoc Ham">
                                <label for="hocHam">Hoc Ham</label>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-floating">
                                <input type="text" class="form-control"
                                       id="hocVi" th:field="*{hocVi}"
                                       placeholder="Hoc Vi">
                                <label for="hocVi">Hoc Vi</label>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-floating">
                                <input type="text" class="form-control"
                                       id="chuyenNganh" th:field="*{chuyenNganh}"
                                       placeholder="Chuyen Nganh">
                                <label for="chuyenNganh">Chuyen Nganh</label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Section: SinhVien fields -->
                <div id="sinhVienFields" class="d-none">
                    <h6 class="text-uppercase text-muted mb-3"
                        style="font-size:0.75rem; letter-spacing:0.5px;">
                        Thong Tin Sinh Vien
                    </h6>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <div class="form-floating">
                                <select class="form-select" id="maLopHC" th:field="*{maLopHC}">
                                    <option value="">-- Chon Lop Hanh Chinh --</option>
                                    <option th:each="lhc : ${lopHCList}"
                                            th:value="${lhc.maLopHC}"
                                            th:text="${lhc.maLopHC} + ' - ' + ${lhc.tenLopHC}">
                                    </option>
                                </select>
                                <label for="maLopHC">Lop Hanh Chinh <span class="text-danger">*</span></label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Section: Vai Tro -->
                <h6 class="text-uppercase text-muted mb-3"
                    style="font-size:0.75rem; letter-spacing:0.5px;">
                    Vai Tro Nghiep Vu (Co The Chon Nhieu)
                </h6>
                <div class="row g-2 mb-4">
                    <div class="col-auto" th:each="vt : ${vaiTroList}">
                        <div class="form-check form-check-inline">
                            <input class="form-check-input"
                                   type="checkbox"
                                   th:id="'vt_' + ${vt.name()}"
                                   name="vaiTros"
                                   th:value="${vt.name()}"
                                   th:checked="${nguoiDungDTO.vaiTros != null and nguoiDungDTO.vaiTros.contains(vt)}">
                            <label class="form-check-label"
                                   th:for="'vt_' + ${vt.name()}"
                                   th:text="${vt.name()}"></label>
                        </div>
                    </div>
                </div>

                <!-- Buttons -->
                <div class="d-flex gap-2">
                    <button type="submit"
                            class="btn btn-primary"
                            onclick="showLoading(this)">
                        <span class="spinner-border spinner-border-sm d-none me-1" role="status"></span>
                        <i class="bi bi-save me-1"></i>
                        <span th:text="${isEdit} ? 'Cap Nhat' : 'Tao Moi'">Luu</span>
                    </button>
                    <a th:href="@{/nguoi-dung}" class="btn btn-outline-secondary">
                        <i class="bi bi-x-lg me-1"></i>Huy
                    </a>
                </div>
            </form>
        </div>
    </div>

</div>

<th:block layout:fragment="scripts">
<script th:inline="javascript">
    var isEdit = /*[[${isEdit}]]*/ false;
    var currentLoai = /*[[${nguoiDungDTO.loaiNguoiDung != null ? nguoiDungDTO.loaiNguoiDung.name() : ''}]]*/ '';

    function toggleExtraFields() {
        var sel = document.getElementById('loaiNguoiDung');
        var loai = sel ? sel.value : currentLoai;
        var gvFields = document.getElementById('giangVienFields');
        var svFields = document.getElementById('sinhVienFields');

        if (gvFields) gvFields.classList.toggle('d-none', loai !== 'GiangVien');
        if (svFields) svFields.classList.toggle('d-none', loai !== 'SinhVien');
    }

    // Khoi tao khi load trang
    document.addEventListener('DOMContentLoaded', function () {
        if (isEdit) {
            toggleExtraFields();
        } else {
            var sel = document.getElementById('loaiNguoiDung');
            if (sel) sel.addEventListener('change', toggleExtraFields);
        }
        // Neu dang edit, hien field tuong ung
        if (currentLoai) toggleExtraFields();
    });
</script>
</th:block>
</body>
</html>
