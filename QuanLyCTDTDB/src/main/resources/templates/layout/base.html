<!DOCTYPE html>
<!--/*
 * templates/layout/base.html
 *
 * Layout chinh cho toan he thong (Thymeleaf Layout Dialect).
 * Phase 1 - Foundation refactor: tach sidebar / flash / confirm-modal /
 * toast-container ra cac fragment trong templates/fragments/_*.html.
 *
 * Khong dung dark-mode, khong command-palette, khong gradient flashy —
 * chinh thong theo phong cach University Admin.
 */-->
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - Hệ Thống QLĐTXS">Hệ Thống QLĐTXS</title>

    <!-- Theme color (PWA / mobile chrome bar) -->
    <meta name="theme-color" content="#0f2d52">
    <meta name="color-scheme" content="light">

    <!-- Google Fonts: Inter (body) + Be Vietnam Pro (display) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Be+Vietnam+Pro:wght@500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- Bootstrap 5.3 CSS -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/main.css}">

    <!-- Page-specific head content -->
    <th:block layout:fragment="head"></th:block>
</head>
<body>

<!-- Accessibility: skip directly to main content (visible on keyboard focus) -->
<a th:href="@{#mainContent}" class="skip-link">Bỏ qua điều hướng, đến nội dung chính</a>

<!-- ===================== NAVBAR ===================== -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top" id="mainNavbar">
    <div class="container-fluid px-3">
        <!-- Brand -->
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" th:href="@{/dashboard}"
           aria-label="Hệ thống quản lý đào tạo xuất sắc — về trang chủ">
            <span class="navbar-brand-mark" aria-hidden="true">
                <i class="bi bi-mortarboard-fill"></i>
            </span>
            <span class="d-none d-sm-flex flex-column lh-1">
                <span class="navbar-brand-title">Hệ Thống QLĐTXS</span>
                <small class="navbar-brand-sub d-none d-md-inline">Đào Tạo Xuất Sắc · ĐH Nha Trang</small>
            </span>
            <span class="d-inline d-sm-none">QLĐTXS</span>
        </a>

        <!-- Mobile sidebar toggle -->
        <button class="btn btn-sm btn-outline-light d-lg-none me-2"
                id="sidebarToggleMobile" type="button"
                aria-label="Mở / đóng sidebar">
            <i class="bi bi-list"></i>
        </button>

        <!-- Right: Search (admin) + Quick action + User -->
        <div class="ms-auto d-flex align-items-center gap-2">

            <!-- Phase 7: Global search admin (placeholder route /tim-kiem).
                 Chi hien voi PDT/ADMIN. Dropdown form GET de search nhanh.
                 Trang /tim-kiem se duoc xay o Phase 7 — khi do form nay
                 da co san frontend. -->

            <!-- Phase 4: Quick access cho CVHT toi danh sach canh bao chua xu ly. -->
            <div sec:authorize="hasRole('CVHT')" class="d-none d-sm-block">
                <a th:href="@{/danh-gia/canh-bao}"
                   class="btn btn-sm btn-warning text-dark"
                   data-bs-toggle="tooltip" data-bs-title="Cảnh báo sinh viên cần xử lý"
                   aria-label="Cảnh báo sinh viên">
                    <i class="bi bi-bell-fill"></i>
                    <span class="visually-hidden">Cảnh báo</span>
                </a>
            </div>

            <!-- User dropdown -->
            <div class="dropdown">
                <button class="btn btn-sm btn-outline-light dropdown-toggle d-flex align-items-center gap-1"
                        type="button" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="bi bi-person-circle"></i>
                    <span class="d-none d-md-inline"
                          sec:authentication="principal.hoTen">Người Dùng</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end shadow">
                    <li>
                        <div class="dropdown-item-text">
                            <small class="text-muted d-block"
                                   sec:authentication="principal.username"></small>
                            <small class="fw-medium"
                                   sec:authentication="principal.hoTen"></small>
                        </div>
                    </li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <a class="dropdown-item" th:href="@{/profile}">
                            <i class="bi bi-person me-2"></i>Hồ Sơ Cá Nhân
                        </a>
                    </li>
                    <li>
                        <form th:action="@{/logout}" method="post">
                            <input type="hidden"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}">
                            <button type="submit" class="dropdown-item text-danger">
                                <i class="bi bi-box-arrow-right me-2"></i>Đăng Xuất
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</nav>

<!-- ===================== SIDEBAR ===================== -->
<th:block th:replace="~{fragments/_sidebar :: sidebar}"></th:block>

<!-- ===================== MAIN CONTENT ===================== -->
<main class="main-content" id="mainContent" tabindex="-1">
    <div class="container-fluid py-4 px-4">

        <!-- Flash Messages (banner) — fragment _flash voi auto-dismiss + toast bridge -->
        <th:block th:replace="~{fragments/_flash :: flash}"></th:block>

        <!-- Page Content -->
        <div layout:fragment="content">
            <!-- Content goes here -->
        </div>

    </div>

    <!-- ===================== FOOTER ===================== -->
    <footer class="app-footer" role="contentinfo">
        <div class="app-footer-inner">
            <div class="app-footer-brand">
                <i class="bi bi-mortarboard-fill" aria-hidden="true"></i>
                <span>Hệ Thống Quản Lý Đào Tạo Xuất Sắc</span>
            </div>
            <div class="app-footer-meta">
                <span><i class="bi bi-building me-1" aria-hidden="true"></i>
                      Trường Đại Học Nha Trang</span>
                <span class="app-footer-sep" aria-hidden="true">·</span>
                <span>&copy; <span th:text="${#temporals != null ? #temporals.format(#temporals.createNow(), 'yyyy') : 2026}">2026</span> Phòng Đào Tạo</span>
                <span class="app-footer-sep" aria-hidden="true">·</span>
                <span>Phiên bản 1.0</span>
            </div>
        </div>
    </footer>
</main>

<!-- Global Confirm Delete Modal -->
<th:block th:replace="~{fragments/_confirm-modal :: modal}"></th:block>

<!-- Toast container (Phase 1 — Toast.success/error/info) -->
<th:block th:replace="~{fragments/_toast-container :: container}"></th:block>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script th:src="@{/js/main.js}"></script>

<!-- Page-specific scripts -->
<th:block layout:fragment="scripts"></th:block>

</body>
</html>
