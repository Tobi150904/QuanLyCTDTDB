<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/base}">
<head><title>403 — Không Có Quyền Truy Cập</title></head>
<body>
<div layout:fragment="content">
    <div class="error-page">
        <div class="error-card" role="alert" aria-labelledby="errTitle">
            <div class="error-icon-wrap tone-warning" aria-hidden="true">
                <i class="bi bi-shield-lock-fill"></i>
            </div>
            <p class="error-code">Lỗi 403</p>
            <h1 id="errTitle" class="error-title">Không Có Quyền Truy Cập</h1>
            <p class="error-desc">
                Tài khoản của bạn không được cấp quyền truy cập trang này.<br>
                Vui lòng liên hệ quản trị viên nếu cho rằng đây là sự nhầm lẫn.
            </p>

            <!--/* Phase 7: hien role hien tai cua user de ho biet vi sao bi tu choi */-->
            <div sec:authorize="isAuthenticated()"
                 class="d-inline-block px-3 py-2 mb-3 small"
                 style="background: var(--surface-soft); border-radius: var(--radius-sm);">
                <i class="bi bi-person-badge me-1 text-muted" aria-hidden="true"></i>
                <span class="text-muted">Đăng nhập:</span>
                <strong sec:authentication="principal.hoTen">--</strong>
                <code class="ms-1" sec:authentication="name">--</code>
            </div>

            <div th:if="${requestUri}" class="small text-muted mb-3">
                <i class="bi bi-link-45deg me-1" aria-hidden="true"></i>
                Yêu cầu: <code th:text="${requestUri}">--</code>
            </div>

            <p th:if="${errorMsg}" class="text-danger small mb-3" th:text="${errorMsg}"></p>

            <div class="d-flex justify-content-center gap-2 flex-wrap">
                <a th:href="@{/dashboard}" class="btn btn-primary">
                    <i class="bi bi-house-door me-1" aria-hidden="true"></i>Về Trang Chủ
                </a>
                <button type="button" class="btn btn-outline-secondary"
                        onclick="history.back()">
                    <i class="bi bi-arrow-left me-1" aria-hidden="true"></i>Quay Lại
                </button>
                <a sec:authorize="isAuthenticated()" th:href="@{/logout}"
                   class="btn btn-outline-danger"
                   onclick="return confirm('Đăng xuất để đăng nhập tài khoản khác?')">
                    <i class="bi bi-box-arrow-right me-1" aria-hidden="true"></i>Đổi Tài Khoản
                </a>
            </div>

            <hr class="soft-divider">
            <p class="small text-muted mb-0">
                <i class="bi bi-shield-check me-1" aria-hidden="true"></i>
                Hệ thống áp dụng chính sách phân quyền theo vai trò để bảo vệ dữ liệu nhạy cảm.
            </p>
        </div>
    </div>
</div>
</body>
</html>
