<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Khong tim thay</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">
<div class="card shadow-sm" style="max-width:520px;width:100%">
    <div class="card-body p-5 text-center">
        <div class="mb-3" style="font-size:3rem;color:var(--primary)">404</div>
        <h4 class="fw-bold mb-2" th:text="${errorTitle}">Khong tim thay</h4>
        <p class="text-muted mb-4" th:text="${errorMessage}">Du lieu khong ton tai</p>
        <a th:href="${backUrl}" class="btn btn-primary">Quay lai</a>
        <a th:href="@{/dashboard}" class="btn btn-outline-secondary ms-2">Trang chu</a>
    </div>
</div>
</body>
</html>
