# =============================================================================
# He Thong Quan Ly Dao Tao Xuat Sac
# Spring Boot + Thymeleaf + MySQL (XAMPP)
# =============================================================================

# Server
server.port=8080
server.servlet.context-path=/

# =============================================================================
# DataSource - XAMPP MySQL
# =============================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/QuanLyCTDTDB\
  ?useUnicode=true\
  &characterEncoding=UTF-8\
  &serverTimezone=Asia/Ho_Chi_Minh\
  &useSSL=false\
  &allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool (HikariCP mac dinh)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# =============================================================================
# JPA / Hibernate
# =============================================================================
# validate: kiem tra schema khop voi entity, KHONG tu dong tao/xoa bang.
# Neu bi loi "Schema validation: missing table [...]" -> chay scripts/03_fix_missing_tables.sql
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# QUAN TRONG: Giu nguyen ten bang theo @Table(name="...") - khong convert CamelCase -> snake_case
# Neu bo dong nay, Spring Boot default se convert "BCN_ThanhVien" -> "bcn_thanh_vien" gay mismatch
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl

# MySQL dialect: XAMPP MySQL 5.5 qua cu cho Hibernate 7 - ep dung MySQL dialect hien dai
# Khuyen cao: nang cap XAMPP len MySQL 8.0+ khi trien khai production
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
# Open-in-view: false de tranh lazy loading ngam ngoai transaction
spring.jpa.open-in-view=false

# =============================================================================
# Thymeleaf
# =============================================================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# =============================================================================
# File Upload
# =============================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB
# Thu muc luu file upload (tuong doi so voi thu muc chay project)
file.upload-dir=uploads/

# =============================================================================
# Spring Mail
# Dev: dung MockEmailServiceImpl (chi log, khong gui that)
# Prod: bat comment phan duoi, comment dong spring.mail.host=stub
# =============================================================================
# Stub host ngan Spring Mail auto-configure yeu cau server that
spring.mail.host=localhost
spring.mail.port=25
spring.mail.test-connection=false
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
# --- Khi deploy production: xoa 5 dong tren, bat 6 dong duoi ---
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=your-email@ntu.edu.vn
# spring.mail.password=your-app-password
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true

# =============================================================================
# Session
# =============================================================================
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true

# =============================================================================
# Logging
# =============================================================================
logging.level.root=WARN
logging.level.com.ntu.quanlyctdt=DEBUG
logging.level.org.springframework.security=INFO
# Bat SQL log khi can debug: doi show-sql=true va uncomment dong sau
# logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# =============================================================================
# Thong tin ung dung (su dung trong template)
# =============================================================================
app.name=He Thong Quan Ly Dao Tao Xuat Sac
app.version=1.0.0
app.upload.allowed-extensions=pdf,doc,docx,xlsx,xls
