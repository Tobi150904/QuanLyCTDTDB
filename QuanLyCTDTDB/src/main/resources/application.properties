# =============================================================================
# He Thong Quan Ly Dao Tao Xuat Sac
# Spring Boot + Thymeleaf + MySQL (XAMPP)
# =============================================================================

# Server
server.port=8080
server.servlet.context-path=/

# =============================================================================
# DataSource - XAMPP MySQL
# =============================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/QuanLyCTDTDB\
  ?useUnicode=true\
  &characterEncoding=UTF-8\
  &serverTimezone=Asia/Ho_Chi_Minh\
  &useSSL=false\
  &allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool (HikariCP mac dinh)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# =============================================================================
# JPA / Hibernate
# =============================================================================
# validate: kiem tra schema khop voi entity, KHONG tu dong tao/xoa bang
# Dung validate sau khi chay create_tables.sql
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
# Hibernate 6+ (Boot 3.x) tu detect dialect qua JDBC URL, khong can khai bao
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
# Open-in-view: false de tranh lazy loading ngam ngoai transaction
spring.jpa.open-in-view=false

# =============================================================================
# Thymeleaf
# =============================================================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# =============================================================================
# File Upload
# =============================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB
# Thu muc luu file upload (tuong doi so voi thu muc chay project)
file.upload-dir=uploads/

# =============================================================================
# Spring Mail (cau hinh khi deploy thuc te)
# Trong dev: tat mail de tranh loi startup
# =============================================================================
# Mail config: bat comment khi deploy thuc te, thay the email/password that
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=your-email@gmail.com
# spring.mail.password=your-app-password
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true
# spring.mail.properties.mail.smtp.starttls.required=true
# spring.mail.test-connection=false

# =============================================================================
# Session
# =============================================================================
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true

# =============================================================================
# Logging
# =============================================================================
logging.level.root=WARN
logging.level.com.ntu.quanlyctdt=DEBUG
logging.level.org.springframework.security=INFO
# Bat SQL log khi can debug: doi show-sql=true va uncomment dong sau
# logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# =============================================================================
# Thong tin ung dung (su dung trong template)
# =============================================================================
app.name=He Thong Quan Ly Dao Tao Xuat Sac
app.version=1.0.0
app.upload.allowed-extensions=pdf,doc,docx,xlsx,xls
